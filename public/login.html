<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RenewDesk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .form-control {
            background-color: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
        }
        .form-control:focus {
            background-color: #0d1117;
            border-color: #58a6ff;
            color: #c9d1d9;
            box-shadow: 0 0 0 3px rgba(88,166,255,0.3);
        }
        .form-control::placeholder { color: #8b949e; }
        .btn-primary {
            background-color: #238636;
            border-color: #2ea043;
            width: 100%;
            font-weight: 500;
        }
        .btn-primary:hover {
            background-color: #2ea043;
            border-color: #3fb950;
        }
        .brand-icon {
            font-size: 3rem;
            color: #58a6ff;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <i class="bi bi-shield-lock brand-icon"></i>
    <h3 class="mb-4">RenewDesk Sign In</h3>
    
    <div id="alertBox" class="alert alert-danger d-none" role="alert"></div>

    <form id="loginForm">
        <div class="mb-3 text-start">
            <label class="form-label">Email address</label>
            <input type="email" id="email" class="form-control" placeholder="admin@renewdesk.local" required>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">
            Sign In
        </button>
    </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const alertBox = document.getElementById('alertBox');
    
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Signing in...';
    alertBox.classList.add('d-none');

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        const res = await fetch('/api/auth/login.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.status === 'success') {
            window.location.href = 'dashboard.html';
        } else {
            alertBox.textContent = data.message || 'Invalid login credentials.';
            alertBox.classList.remove('d-none');
        }
    } catch (err) {
        alertBox.textContent = 'Server error. Please try again later.';
        alertBox.classList.remove('d-none');
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
    }
});
</script>

</body>
</html>
