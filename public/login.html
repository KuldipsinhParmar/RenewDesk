<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Login - RenewDesk</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        .login-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 25px 50px -12px rgba(43, 108, 238, 0.15);
        }
    </style>
</head>
<body class="bg-background-light font-display text-slate-900 antialiased h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Decorative Gradients -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-primary/10 blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] rounded-full bg-purple-500/10 blur-[120px]"></div>
    </div>

    <!-- Login Container -->
    <div class="w-full max-w-md px-6 z-10">
        
        <!-- Logo Header -->
        <div class="flex flex-col items-center justify-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary to-blue-400 flex items-center justify-center text-white mb-6 shadow-xl shadow-primary/30 transform hover:scale-105 transition-transform">
                <span class="material-symbols-outlined text-3xl">autorenew</span>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 mb-2">Welcome Back</h1>
            <p class="text-slate-500 text-sm font-medium">Log in to the RenewDesk Executive Dashboard</p>
        </div>

        <!-- Login Card -->
        <div class="login-glass rounded-3xl p-8 md:p-10 w-full relative">
            
            <div id="alertBox" class="hidden mb-6 p-4 rounded-xl text-sm font-semibold flex items-center gap-2 bg-red-500/10 text-red-600 border border-red-500/20"></div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2" for="email">Email Address</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">mail</span>
                        <input type="email" id="email" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-12 pr-4 py-3.5 text-sm font-medium focus:ring-2 focus:ring-primary/40 focus:border-primary/40 transition-colors shadow-sm outline-none placeholder-slate-400" placeholder="admin@renewdesk.local" required>
                    </div>
                </div>
                
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider" for="password">Password</label>
                        <a href="#" class="text-xs font-bold text-primary hover:text-purple-600 transition-colors">Forgot Password?</a>
                    </div>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock</span>
                        <input type="password" id="password" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-12 pr-4 py-3.5 text-sm font-medium focus:ring-2 focus:ring-primary/40 focus:border-primary/40 transition-colors shadow-sm outline-none placeholder-slate-400" placeholder="••••••••" required>
                    </div>
                </div>
                
                <button type="submit" id="loginBtn" class="w-full bg-primary flex items-center justify-center gap-2 text-white px-6 py-4 rounded-xl font-bold text-sm shadow-xl shadow-primary/20 hover:scale-[1.02] hover:shadow-primary/30 transition-all mt-8">
                    Sign In <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                </button>
            </form>
            
        </div>
        
        <div class="mt-8 text-center text-sm font-semibold text-slate-500 flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-slate-400 text-[18px]">arrow_back</span>
            <a href="index.html" class="hover:text-primary transition-colors">Return to Homepage</a>
        </div>
        
    </div>

<script src="assets/js/rd-api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const alertBox = document.getElementById('alertBox');
    const originalContent = btn.innerHTML;
    
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]">progress_activity</span> Authenticating...';
    alertBox.classList.add('hidden');

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
        const res = await fetch(rdApi('api/auth/login.php'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ email, password })
        });
        const text = await res.text();
        let data;
        try {
            data = JSON.parse(text);
        } catch {
            alertBox.innerHTML = `<span class="material-symbols-outlined text-[18px]">error</span> Server returned HTTP ${res.status} with a non-JSON response. Check that PHP is enabled and the site root is the <code class="text-xs">public</code> folder.`;
            alertBox.classList.remove('hidden');
            btn.disabled = false;
            btn.innerHTML = originalContent;
            return;
        }

        if (data.status === 'success') {
            btn.classList.remove('bg-primary');
            btn.classList.add('bg-emerald-500');
            btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">check_circle</span> Success! Redirecting...';
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 600);
        } else {
            alertBox.innerHTML = `<span class="material-symbols-outlined text-[18px]">error</span> ${data.message || 'Invalid login credentials.'}`;
            alertBox.classList.remove('hidden');
            btn.disabled = false;
            btn.innerHTML = originalContent;
        }
    } catch (err) {
        alertBox.innerHTML = '<span class="material-symbols-outlined text-[18px]">wifi_off</span> Server connection error.';
        alertBox.classList.remove('hidden');
        btn.disabled = false;
        btn.innerHTML = originalContent;
    }
});
</script>

</body>
</html>
