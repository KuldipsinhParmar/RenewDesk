<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#0a0e17",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
        }
        .sidebar-item-active {
            background: linear-gradient(90deg, rgba(43, 108, 238, 0.15) 0%, rgba(43, 108, 238, 0) 100%);
            border-left: 3px solid #2b6cee;
        }
        select {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: none !important;
        }
        select::-ms-expand {
            display: none;
        }
        .custom-select-container::after {
            content: 'expand_more';
            font-family: 'Material Symbols Outlined';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #94a3b8;
            font-size: 20px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased h-screen overflow-hidden flex flex-col">

<!-- Top Navigation -->
<nav class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/80 backdrop-blur-xl flex-shrink-0 z-50 flex items-center justify-between px-6 sticky top-0 shadow-sm shadow-slate-200/20 dark:shadow-none transition-all">
    <div class="flex items-center gap-8 h-full">
        <!-- Logo -->
        <div class="flex items-center gap-3 relative z-10 group cursor-pointer transition-transform hover:scale-[1.02]">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-blue-400 flex items-center justify-center text-white shadow-[0_0_15px_rgba(43,108,238,0.3)]">
                <span class="material-symbols-outlined text-[18px]">autorenew</span>
            </div>
            <h1 class="text-lg font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-500 dark:from-white dark:to-slate-400 leading-none">RenewDesk</h1>
        </div>

        <!-- Links -->
        <div class="hidden lg:flex items-center h-full gap-2">
            <a href="dashboard.html" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-semibold transition-all text-slate-500 hover:bg-slate-100 hover:text-slate-800 dark:text-slate-400 dark:hover:bg-slate-800/50 dark:hover:text-white"><span class="material-symbols-outlined text-[18px]">dashboard</span> Dashboard</a>
            <a href="projects.html" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-semibold transition-all text-slate-500 hover:bg-slate-100 hover:text-slate-800 dark:text-slate-400 dark:hover:bg-slate-800/50 dark:hover:text-white"><span class="material-symbols-outlined text-[18px]">folder</span> Projects</a>
            <a href="domains.html" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-semibold transition-all bg-primary/10 text-primary border border-primary/20"><span class="material-symbols-outlined text-[18px]">language</span> Domains</a>
            <a href="hosting.html" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-semibold transition-all text-slate-500 hover:bg-slate-100 hover:text-slate-800 dark:text-slate-400 dark:hover:bg-slate-800/50 dark:hover:text-white"><span class="material-symbols-outlined text-[18px]">dns</span> Hosting</a>
            <a href="maintenance.html" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-semibold transition-all text-slate-500 hover:bg-slate-100 hover:text-slate-800 dark:text-slate-400 dark:hover:bg-slate-800/50 dark:hover:text-white"><span class="material-symbols-outlined text-[18px]">engineering</span> Maintenance</a>
            <a href="backups.html" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-semibold transition-all text-slate-500 hover:bg-slate-100 hover:text-slate-800 dark:text-slate-400 dark:hover:bg-slate-800/50 dark:hover:text-white"><span class="material-symbols-outlined text-[18px]">backup</span> Backups</a>
        </div>
    </div>

    <!-- Right Side Actions -->
    <div class="flex items-center gap-3">
        <a href="logs.html" class="text-slate-500 hover:text-slate-800 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800/50 dark:hover:text-white w-8 h-8 rounded-lg flex items-center justify-center transition-all" title="Logs"><span class="material-symbols-outlined text-[20px]">history</span></a>
        <a href="settings.html" class="text-slate-500 hover:text-slate-800 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800/50 dark:hover:text-white w-8 h-8 rounded-lg flex items-center justify-center transition-all" title="Settings"><span class="material-symbols-outlined text-[20px]">settings</span></a>
        
        <div class="hidden sm:block w-[1px] h-5 bg-slate-200 dark:bg-slate-700 mx-1"></div>
        
        <div class="hidden sm:flex items-center gap-2 mr-2">
            <div class="w-8 h-8 rounded-full border border-slate-200 dark:border-slate-700 p-0.5 flex items-center justify-center bg-slate-100 dark:bg-slate-800 text-xs font-bold text-slate-600 dark:text-slate-300 shadow-sm">AD</div>
            <div class="text-left">
                <p class="text-xs font-bold text-slate-900 dark:text-white leading-tight">Admin</p>
                <p class="text-[10px] text-slate-500 uppercase tracking-tighter font-semibold">IT Manager</p>
            </div>
        </div>
        
        <button id="logoutBtn" class="flex items-center justify-center w-8 h-8 rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors" title="Logout"><span class="material-symbols-outlined text-[20px]">logout</span></button>
    </div>
</nav>

    

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden bg-background-light dark:bg-background-dark relative">
        <!-- Header -->
        <header class="h-20 border-b border-slate-200 dark:border-slate-800 px-8 flex items-center justify-between bg-white/50 dark:bg-background-dark/50 backdrop-blur-md z-10">
            <div>
                <h2 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">All Domains</h2>
            </div>
            <div class="flex items-center gap-4">
                
            </div>
        </header>

        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar z-10 relative">
            <div class="flex items-center gap-4 mb-8">
                <div class="relative flex-1 max-w-md">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">search</span>
                    <input id="searchData" class="w-full bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-primary/40 focus:border-primary/40 dark:text-slate-200 shadow-sm transition-all" placeholder="Search domains..." type="text"/>
                </div>
                <div class="relative w-40 custom-select-container">
                    <select id="yearFilter" class="w-full bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 pr-10 text-sm focus:ring-2 focus:ring-primary/40 focus:border-primary/40 dark:text-slate-200 shadow-sm transition-all outline-none">
                        <option value="">All Years</option>
                    </select>
                </div>
            </div>
            
            <div class="glass-card rounded-2xl overflow-hidden border-slate-200 dark:border-slate-800">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-slate-100 dark:bg-slate-800/50">
                            <th class="text-left py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Domain & Registrar</th>
                            <th class="text-left py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Project</th>
                            <th class="text-left py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Renewal Date</th>
                            <th class="text-right py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Price</th>
                            <th class="text-center py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Status</th>
                            <th class="text-right py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 w-48">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 dark:divide-slate-800" id="dataTable">
                        <tr><td colspan="6" class="text-center py-6 text-slate-500">Loading domains...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Footer area with decorative glow -->
            <div class="fixed bottom-0 right-0 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] pointer-events-none -z-20 translate-x-1/2 translate-y-1/2"></div>
        </div>
    </main>

<script src="assets/js/rd-api.js"></script>
<script>
let listData = [];

async function loadData() {
    try {
        const res = await fetch(rdApi('api/domains.php'), { credentials: 'same-origin' });
        if (res.status === 401) window.location.href = 'login.html';
        const data = await res.json();
        listData = data.data;
        populateYearFilter();
        
        // Default to current year if available
        const currentYear = new Date().getFullYear().toString();
        const yearSelect = document.getElementById('yearFilter');
        if ([...yearSelect.options].some(opt => opt.value === currentYear)) {
            yearSelect.value = currentYear;
        }
        
        filterData();
    } catch(e) {
        console.error("Failed to load domains", e);
    }
}

function formatD(d) {
    if (!d) return '-';
    let dt = new Date(d);
    return `${dt.getDate().toString().padStart(2,'0')}-${(dt.getMonth()+1).toString().padStart(2,'0')}-${dt.getFullYear()}`;
}

function renderData(dataset) {
    const tbody = document.getElementById('dataTable');
    tbody.innerHTML = '';
    
    if (dataset.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-slate-500 dark:text-slate-400"><span class="material-symbols-outlined text-4xl block mb-2 text-slate-300 dark:text-slate-600">language</span>No domains found.</td></tr>';
        return;
    }

    dataset.forEach(item => {
        tbody.innerHTML += `
            <tr class="hover:bg-slate-50 dark:hover:bg-white/5 transition-colors">
                <td class="py-4 px-6">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary flex-shrink-0">
                            <span class="material-symbols-outlined text-sm">language</span>
                        </div>
                        <div>
                            <div class="font-bold text-sm text-slate-900 dark:text-white leading-tight">${item.domain_name}</div>
                            <div class="text-[11px] text-slate-400 dark:text-slate-500 font-medium uppercase tracking-wider mt-0.5">${item.registrar || '-'}</div>
                        </div>
                    </div>
                </td>
                <td class="py-4 px-6 text-sm text-slate-500 dark:text-slate-400"><a href="project-details.html?id=${item.project_id}" class="hover:text-primary transition-colors hover:underline font-medium">${item.project_name}</a></td>
                <td class="py-4 px-6 text-sm font-bold ${item.client_paid == 1 ? 'text-emerald-500' : (new Date(item.renewal_date) < new Date() ? 'text-rose-500' : 'text-emerald-500')}">
                    ${formatD(item.renewal_date)}
                </td>
                <td class="py-4 px-6 text-right font-bold text-slate-900 dark:text-white">₹${new Intl.NumberFormat('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(item.price)}</td>
                <td class="py-4 px-6 text-center">
                    <div class="flex justify-center">
                        <span class="w-2.5 h-2.5 rounded-full ${item.client_paid == 1 ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : 'bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.5)]'}" title="${item.client_paid == 1 ? 'PAID' : 'PENDING'}"></span>
                    </div>
                </td>
                <td class="py-4 px-6 text-right space-x-2">
                    ${item.client_paid == 1 ? '' : `
                    <button onclick="markRenewed(${item.id}, '${item.renewal_date}')" class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-emerald-500/10 text-emerald-600 hover:bg-emerald-500 hover:text-white transition-all shadow-sm" title="Renew Done">
                        <span class="material-symbols-outlined text-[18px]">check_circle</span>
                    </button>
                    `}
                    <a href="project-details.html?id=${item.project_id}" class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 hover:text-primary transition-all">
                        <span class="material-symbols-outlined text-[18px]">open_in_new</span>
                    </a>
                </td>
            </tr>
        `;
    });
}

function populateYearFilter() {
    const yearSelect = document.getElementById('yearFilter');
    const years = [...new Set(listData.map(item => {
        const d = new Date(item.renewal_date);
        return d.getFullYear();
    }))].filter(y => y && !isNaN(y) && y > 2000).sort((a, b) => b - a);
    
    yearSelect.innerHTML = '<option value="">All Years</option>';
    years.forEach(year => {
        yearSelect.innerHTML += `<option value="${year}">${year}</option>`;
    });
}

function filterData() {
    const term = document.getElementById('searchData').value.toLowerCase();
    const year = document.getElementById('yearFilter').value;
    
    const filtered = listData.filter(p => {
        const matchesTerm = p.domain_name.toLowerCase().includes(term) || (p.project_name && p.project_name.toLowerCase().includes(term));
        const matchesYear = year === "" || new Date(p.renewal_date).getFullYear().toString() === year;
        return matchesTerm && matchesYear;
    });
    renderData(filtered);
}

document.getElementById('searchData').addEventListener('input', filterData);
document.getElementById('yearFilter').addEventListener('change', filterData);

async function markRenewed(id, oldDate) {
    const result = await Swal.fire({
        title: 'Renew Domain?',
        text: "This will record payment and schedule the next year's renewal.",
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#10b981',
        cancelButtonColor: '#f43f5e',
        confirmButtonText: 'Yes, Renew it!',
        background: document.documentElement.classList.contains('dark') ? '#1e293b' : '#fff',
        color: document.documentElement.classList.contains('dark') ? '#fff' : '#000'
    });

    if (!result.isConfirmed) return;
    
    let dt = new Date(oldDate);
    dt.setFullYear(dt.getFullYear() + 1);
    const newDate = dt.toISOString().split('T')[0];
    
    try {
        const item = listData.find(x => x.id == id);
        
        // 1. Update current record to PAID
        await fetch(rdApi(`api/domains.php?id=${id}`), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ ...item, client_paid: 1, status: 'renewed' })
        });

        // 2. Insert NEW record for the next year
        const nextPayload = {
            project_id: item.project_id,
            domain_name: item.domain_name,
            registrar: item.registrar,
            renewal_date: newDate,
            price: item.price,
            client_paid: 0,
            auto_renew: item.auto_renew,
            status: 'active',
            notes: item.notes
        };

        await fetch(rdApi(`api/domains.php`), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify(nextPayload)
        });
        
        Swal.fire({
            title: 'Processed!',
            text: 'Domain renewal and payment tracked successfully.',
            icon: 'success',
            timer: 2000,
            showConfirmButton: false,
            background: document.documentElement.classList.contains('dark') ? '#1e293b' : '#fff',
            color: document.documentElement.classList.contains('dark') ? '#fff' : '#000'
        });
        
        loadData();
    } catch(e) {
        console.error("Failed to renew", e);
        Swal.fire('Error', 'Failed to process domain renewal.', 'error');
    }
}

loadData();
</script>
</body>
</html>
