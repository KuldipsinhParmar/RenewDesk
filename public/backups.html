    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden bg-background-light dark:bg-background-dark relative">

                <h2 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">All Backups</h2>
            </div>
            <div class="flex items-center gap-4">
                
            </div>
        </header>

        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar z-10 relative">
            <div class="flex items-center justify-between mb-8">
                <div class="relative w-96">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">search</span>
                    <input id="searchData" class="w-full bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-primary/40 focus:border-primary/40 dark:text-slate-200 shadow-sm transition-all" placeholder="Search backups (by project name)..." type="text"/>
                </div>
            </div>
            
            <div class="glass-card rounded-2xl overflow-hidden border-slate-200 dark:border-slate-800">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-slate-100 dark:bg-slate-800/50">
                            <th class="text-left py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Project</th>
                            <th class="text-left py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Frequency</th>
                            <th class="text-left py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Backups</th>
                            <th class="text-center py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Status</th>
                            <th class="text-right py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 w-48">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 dark:divide-slate-800" id="dataTable">
                        <tr><td colspan="6" class="text-center py-6 text-slate-500">Loading backups...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Footer area with decorative glow -->
            <div class="fixed bottom-0 right-0 w-[500px] h-[500px] bg-emerald-500/5 rounded-full blur-[120px] pointer-events-none -z-20 translate-x-1/2 translate-y-1/2"></div>
        </div>
    </main>

<script src="assets/js/rd-api.js"></script>
<script>
let listData = [];

async function loadData() {
    try {
        const res = await fetch(rdApi('api/backups.php'), { credentials: 'same-origin' });
        if (res.status === 401) window.location.href = 'login.html';
        const data = await res.json();
        listData = data.data;
        renderData(listData);
    } catch(e) {
        console.error("Failed to load backups", e);
    }
}

function formatD(d) {
    if (!d) return '-';
    let dt = new Date(d);
    return `${dt.getDate().toString().padStart(2,'0')}-${(dt.getMonth()+1).toString().padStart(2,'0')}-${dt.getFullYear()}`;
}

function renderData(dataset) {
    const tbody = document.getElementById('dataTable');
    tbody.innerHTML = '';
    
    if (dataset.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center py-10 text-slate-500 dark:text-slate-400"><span class="material-symbols-outlined text-4xl block mb-2 text-slate-300 dark:text-slate-600">backup</span>No backups found.</td></tr>';
        return;
    }

    dataset.forEach(item => {
        tbody.innerHTML += `
            <tr class="hover:bg-slate-50 dark:hover:bg-white/5 transition-colors">
                <td class="py-4 px-6">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-lg bg-emerald-500/10 flex items-center justify-center text-emerald-600 dark:text-emerald-400">
                            <span class="material-symbols-outlined text-sm">backup</span>
                        </div>
                        <a href="project-details.html?id=${item.project_id}" class="font-semibold text-sm text-slate-900 dark:text-white hover:text-primary transition-colors hover:underline">${item.project_name}</a>
                    </div>
                </td>
                <td class="py-4 px-6">
                    <span class="px-2.5 py-1 rounded-lg text-[11px] font-bold bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 border border-slate-200 dark:border-slate-700 uppercase tracking-wider">${item.frequency}</span>
                </td>
                <td class="py-4 px-6">
                    <div class="font-bold text-sm ${item.client_paid == 1 ? 'text-emerald-500' : (new Date(item.next_backup) < new Date() ? 'text-rose-500' : 'text-emerald-500')} leading-tight">Last: ${formatD(item.last_backup)}</div>
                    <div class="text-[11px] text-slate-400 dark:text-slate-500 font-medium uppercase tracking-wider mt-0.5">Next: ${formatD(item.next_backup)}</div>
                </td>
                <td class="py-4 px-6 text-center">
                    <div class="flex justify-center">
                        <span class="w-2.5 h-2.5 rounded-full ${item.client_paid == 1 ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : 'bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.5)]'}" title="${item.client_paid == 1 ? 'Paid' : 'Pending'}"></span>
                    </div>
                </td>
                <td class="py-4 px-6 text-right space-x-2">
                    ${item.client_paid == 1 ? '' : `
                    <button onclick="markDone(${item.id}, '${item.next_backup}')" class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-emerald-500/10 text-emerald-600 hover:bg-emerald-500 hover:text-white transition-all shadow-sm" title="Mark Done">
                        <span class="material-symbols-outlined text-[18px]">check_circle</span>
                    </button>
                    `}
                    <a href="project-details.html?id=${item.project_id}" class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 hover:text-primary transition-all">
                        <span class="material-symbols-outlined text-[18px]">open_in_new</span>
                    </a>
                </td>
            </tr>
        `;
    });
}

async function markDone(id, nextDate) {
    const item = listData.find(x => x.id == id);
    let dn = new Date(nextDate);
    
    // Calculate interval based on current record
    if (item.last_backup && item.next_backup) {
        let start = new Date(item.last_backup);
        let end = new Date(item.next_backup);
        let diffTime = end.getTime() - start.getTime();
        // If difference is 0 or negative, use default frequency logic
        if (diffTime > 0) {
            dn = new Date(dn.getTime() + diffTime);
        } else {
            if(item.frequency === 'daily') dn.setDate(dn.getDate() + 1);
            else if(item.frequency === 'weekly') dn.setDate(dn.getDate() + 7);
            else if(item.frequency === 'monthly') dn.setMonth(dn.getMonth() + 1);
        }
    } else {
        if(item.frequency === 'daily') dn.setDate(dn.getDate() + 1);
        else if(item.frequency === 'weekly') dn.setDate(dn.getDate() + 7);
        else if(item.frequency === 'monthly') dn.setMonth(dn.getMonth() + 1);
    }
    const newNext = dn.toISOString().split('T')[0];

    const result = await Swal.fire({
        title: 'Mark Backup Done?',
        html: `This will complete the current cycle and create a new one:<br><br>
               <b>New Last Backup:</b> ${formatD(nextDate)}<br>
               <b>New Next Backup:</b> ${formatD(newNext)}`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#10b981',
        cancelButtonColor: '#f43f5e',
        confirmButtonText: 'Yes, Done!',
        background: document.documentElement.classList.contains('dark') ? '#1e293b' : '#fff',
        color: document.documentElement.classList.contains('dark') ? '#fff' : '#000'
    });

    if (!result.isConfirmed) return;
    try {
        // 1. Update current record to PAID
        await fetch(rdApi(`api/backups.php?id=${id}`), {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ ...item, client_paid: 1 })
        });

        // 2. Insert NEW record
        const nextPayload = {
            project_id: item.project_id,
            frequency: item.frequency,
            last_backup: nextDate,
            next_backup: newNext,
            storage_location: item.storage_location,
            client_paid: 0,
            notes: item.notes
        };

        await fetch(rdApi(`api/backups.php`), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify(nextPayload)
        });
        
        Swal.fire({
            title: 'Success!',
            text: 'Backup entry updated and next cycle scheduled.',
            icon: 'success',
            timer: 2000,
            showConfirmButton: false,
            background: document.documentElement.classList.contains('dark') ? '#1e293b' : '#fff',
            color: document.documentElement.classList.contains('dark') ? '#fff' : '#000'
        });
        
        loadData();
    } catch(e) {
        console.error("Failed to process backup", e);
        Swal.fire('Error', 'Failed to update entry.', 'error');
    }
}

document.getElementById('searchData').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = listData.filter(p => (p.project_name && p.project_name.toLowerCase().includes(term)));
    renderData(filtered);
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch(rdApi('api/auth/logout.php'), { method: 'POST', credentials: 'same-origin' });
    window.location.href = 'login.html';
});

loadData();
</script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
