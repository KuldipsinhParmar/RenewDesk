<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Backups - RenewDesk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/sidebar.js"></script>
    <link rel="stylesheet" href="assets/css/v2.css">
</head>
<body class="rd-body">
<div class="rd-layout">

    <!-- SIDEBAR -->
    <aside class="rd-sidebar" id="rd-sidebar"></aside>
    <script>rdSidebar.init('backups');</script>

    <!-- MAIN -->
    <div class="rd-main">
        <div class="rd-page-header">
            <button class="rd-menu-btn" onclick="rdSidebar.open()" aria-label="Menu"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
            <div><h1 class="rd-page-title">All Backups</h1><p class="rd-page-subtitle">Monitor backup schedules across all projects</p></div>
        </div>

        <div class="rd-toolbar">
            <div class="rd-search-wrap">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
                <input id="searchData" class="rd-search-input" placeholder="Search by project name…" type="text"/>
            </div>
        </div>

        <div class="rd-card">
            <table style="width:100%;border-collapse:collapse">
                <thead><tr>
                    <th style="padding:12px 20px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Project</th>
                    <th style="padding:12px 20px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Frequency</th>
                    <th style="padding:12px 20px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Backup Schedule</th>
                    <th style="padding:12px 20px;text-align:center;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Status</th>
                    <th style="padding:12px 20px;text-align:right;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Actions</th>
                </tr></thead>
                <tbody id="dataTable">
                    <tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-3)">Loading backups…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="assets/js/rd-api.js"></script>
<script>
let listData = [];

async function loadData() {
    try {
        const res = await fetch(rdApi('api/backups.php'), { credentials: 'same-origin' });
        if (res.status === 401) { window.location.href = 'login.html'; return; }
        const data = await res.json();
        listData = data.data;
        renderData(listData);
    } catch(e) { console.error("Failed to load backups", e); }
}

const formatD = rdFormatDate;

function paidPill(paid) {
    return paid == 1
        ? `<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;background:var(--good-soft);color:var(--good);font-size:11.5px;font-weight:700"><span style="width:6px;height:6px;border-radius:50%;background:var(--good)"></span>Done</span>`
        : `<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;background:var(--bad-soft);color:var(--bad);font-size:11.5px;font-weight:700"><span style="width:6px;height:6px;border-radius:50%;background:var(--bad)"></span>Pending</span>`;
}

function freqBadge(f) {
    const colors = { daily:'var(--c-blue)', weekly:'var(--accent)', monthly:'var(--c-amber)', yearly:'var(--text-2)' };
    const c = colors[f] || 'var(--text-3)';
    return `<span style="display:inline-block;padding:3px 10px;border-radius:999px;background:${c}18;color:${c};font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em">${f}</span>`;
}

function renderData(dataset) {
    const tbody = document.getElementById('dataTable');
    if (dataset.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-3)">No backups found.</td></tr>';
        return;
    }
    tbody.innerHTML = dataset.map(item => {
        const nextColor = item.client_paid == 1 ? 'var(--good)' : (new Date(item.next_backup) < new Date() ? 'var(--bad)' : 'var(--good)');
        return `<tr style="transition:background .1s" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background=''">
            <td style="padding:14px 20px;border-bottom:1px solid var(--border)">
                <a href="project-details.html?id=${item.project_id}" style="font-weight:600;font-size:14px;color:var(--text);text-decoration:none" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text)'">${item.project_name}</a>
                ${item.storage_location ? `<div style="font-size:11px;color:var(--text-3);margin-top:2px">${item.storage_location}</div>` : ''}
            </td>
            <td style="padding:14px 20px;border-bottom:1px solid var(--border)">${freqBadge(item.frequency || '—')}</td>
            <td style="padding:14px 20px;border-bottom:1px solid var(--border)">
                <div style="font-size:13.5px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:${nextColor}">Next: ${formatD(item.next_backup)}</div>
                <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px">Last: ${formatD(item.last_backup)}</div>
            </td>
            <td style="padding:14px 20px;border-bottom:1px solid var(--border);text-align:center">${paidPill(item.client_paid)}</td>
            <td style="padding:14px 20px;border-bottom:1px solid var(--border)">
                <div style="display:flex;gap:7px;justify-content:flex-end">
                    ${item.client_paid == 1 ? '' : `<button onclick="markDone(${item.id},'${item.next_backup}')" class="rd-icon-btn success" title="Mark Done"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.5 12.3l2.4 2.4 4.6-5"/></svg></button>`}
                    <a href="project-details.html?id=${item.project_id}" class="rd-icon-btn" title="Open Project"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h6v6"/><path d="M20 4l-9 9"/><path d="M18 14v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4"/></svg></a>
                </div>
            </td>
        </tr>`;
    }).join('');
}

async function markDone(id, nextDate) {
    const item = listData.find(x => x.id == id);
    let dn = new Date(nextDate);
    if (item.last_backup && item.next_backup) {
        let start = new Date(item.last_backup);
        let end = new Date(item.next_backup);
        let diffTime = end.getTime() - start.getTime();
        if (diffTime > 0) {
            dn = new Date(dn.getTime() + diffTime);
        } else {
            if(item.frequency === 'daily') dn.setDate(dn.getDate() + 1);
            else if(item.frequency === 'weekly') dn.setDate(dn.getDate() + 7);
            else if(item.frequency === 'monthly') dn.setMonth(dn.getMonth() + 1);
        }
    } else {
        if(item.frequency === 'daily') dn.setDate(dn.getDate() + 1);
        else if(item.frequency === 'weekly') dn.setDate(dn.getDate() + 7);
        else if(item.frequency === 'monthly') dn.setMonth(dn.getMonth() + 1);
    }
    const newNext = dn.toISOString().split('T')[0];

    const result = await Swal.fire({
        title:'Mark Backup Done?',
        html:`Complete this cycle and schedule the next one:<br><br><b>New Last Backup:</b> ${formatD(nextDate)}<br><b>New Next Backup:</b> ${formatD(newNext)}`,
        icon:'question', showCancelButton:true, confirmButtonColor:'#0f9d76', cancelButtonColor:'#df433f', confirmButtonText:'Yes, Done!'
    });
    if (!result.isConfirmed) return;
    try {
        await fetch(rdApi(`api/backups.php?id=${id}`), { method:'PUT', headers:{'Content-Type':'application/json'}, credentials:'same-origin',
            body:JSON.stringify({project_id:item.project_id,frequency:item.frequency,last_backup:nextDate,next_backup:newNext,storage_location:item.storage_location,client_paid:0,notes:item.notes}) });
        Swal.fire({ title:'Done!', text:'Backup cycle updated.', icon:'success', timer:1800, showConfirmButton:false });
        loadData();
    } catch(e) { Swal.fire('Error','Failed to update.','error'); }
}

document.getElementById('searchData').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    renderData(listData.filter(p => p.project_name && p.project_name.toLowerCase().includes(term)));
});

loadData();
</script>
</body>
</html>
