<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Projects - RenewDesk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/sidebar.js"></script>
    <link rel="stylesheet" href="assets/css/v2.css">
</head>
<body class="rd-body">
<div class="rd-layout">

    <!-- SIDEBAR -->
    <aside class="rd-sidebar" id="rd-sidebar"></aside>
    <script>rdSidebar.init('projects');</script>

    <!-- MAIN -->
    <div class="rd-main">
        <div class="rd-page-header">
            <button class="rd-menu-btn" onclick="rdSidebar.open()" aria-label="Menu"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
            <div>
                <h1 class="rd-page-title">Projects</h1>
                <p class="rd-page-subtitle" id="projCount">Loading portfolio…</p>
            </div>
            <button onclick="showAddModal()" class="rd-btn rd-btn-primary">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                Create Project
            </button>
        </div>

        <!-- Toolbar -->
        <div class="rd-toolbar">
            <div class="rd-search-wrap">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
                <input id="searchProjects" class="rd-search-input" placeholder="Search projects…" type="text"/>
            </div>
            <select id="clientFilter" class="rd-filter-select">
                <option value="">All Clients</option>
            </select>
        </div>

        <!-- Table -->
        <div class="rd-card">
            <table style="width:100%;border-collapse:collapse">
                <thead><tr>
                    <th style="padding:13px 20px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Project Name</th>
                    <th style="padding:13px 16px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Client</th>
                    <th style="padding:13px 16px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Created On</th>
                    <th style="padding:13px 16px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Status</th>
                    <th style="padding:13px 20px;text-align:right;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Actions</th>
                </tr></thead>
                <tbody id="projectTable">
                    <tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-3)">Loading projects…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="addProjectModal" style="display:none;position:fixed;inset:0;z-index:50;background:rgba(21,24,26,.45);backdrop-filter:blur(4px);align-items:center;justify-content:center">
    <div class="rd-modal">
        <div class="rd-modal-header">
            <span class="rd-modal-title" id="modalTitle">Create New Project</span>
            <button onclick="hideAddModal()" class="rd-modal-close">×</button>
        </div>
        <div class="rd-modal-body">
            <form id="projectForm" autocomplete="off">
                <div class="rd-form-group">
                    <label class="rd-label">Project Name <span style="color:var(--bad)">*</span></label>
                    <input type="text" id="p_name" class="rd-input" placeholder="e.g. Acme Corp Website" required>
                </div>
                <div class="rd-form-group" style="margin-top:14px">
                    <label class="rd-label">Client</label>
                    <select id="p_client_id" class="rd-input" style="cursor:pointer">
                        <option value="">— No client —</option>
                    </select>
                </div>
                <div class="rd-form-group" style="margin-top:14px">
                    <label class="rd-label">Description / Notes</label>
                    <textarea id="p_desc" class="rd-textarea" placeholder="Brief details about the project scope…" rows="3"></textarea>
                </div>
            </form>
        </div>
        <div class="rd-modal-footer">
            <button onclick="hideAddModal()" style="padding:10px 18px;border-radius:10px;border:1px solid var(--border-2);background:var(--surface);color:var(--text);font-size:14px;font-weight:600;cursor:pointer">Cancel</button>
            <button onclick="saveProject()" id="saveProjectBtn" class="rd-btn rd-btn-primary" style="border-radius:10px;padding:10px 20px">Create Project</button>
        </div>
    </div>
</div>

<script src="assets/js/rd-api.js"></script>
<script>
let projectsData = [];
let clientsData = [];
let currentEditProjectId = null;

async function loadClients() {
    try {
        const res = await fetch(rdApi('api/clients.php'), { credentials: 'same-origin' });
        const data = await res.json();
        clientsData = data.data || [];
        populateClientFilter();
        populateClientDropdown();
    } catch(e) { console.error("Failed to load clients", e); }
}

function populateClientFilter() {
    const sel = document.getElementById('clientFilter');
    const cur = sel.value;
    sel.innerHTML = '<option value="">All Clients</option>';
    clientsData.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name + (c.company ? ` (${c.company})` : '');
        sel.appendChild(opt);
    });
    sel.value = cur;
}

function populateClientDropdown(selectedId) {
    const sel = document.getElementById('p_client_id');
    sel.innerHTML = '<option value="">— No client —</option>';
    clientsData.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.name + (c.company ? ` — ${c.company}` : '');
        if (selectedId && c.id == selectedId) opt.selected = true;
        sel.appendChild(opt);
    });
}

async function loadProjects() {
    try {
        const res = await fetch(rdApi('api/projects.php'), { credentials: 'same-origin' });
        if (res.status === 401) { window.location.href = 'login.html'; return; }
        const data = await res.json();
        projectsData = data.data;
        document.getElementById('projCount').textContent = projectsData.length + ' projects in your portfolio';
        applyFilters();
    } catch(e) { rdError('Failed to load projects.') } catch(e) { console.error("Failed to load projects", e); }
}

const formatDate = rdFormatDate;-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getFullYear()}`;
}

function applyFilters() {
    const term = document.getElementById('searchProjects').value.toLowerCase();
    const clientId = document.getElementById('clientFilter').value;
    let list = projectsData;
    if (term) list = list.filter(p => p.name.toLowerCase().includes(term) || (p.client_name||'').toLowerCase().includes(term));
    if (clientId) list = list.filter(p => String(p.client_id) === clientId);
    renderProjects(list);
}

function renderProjects(dataset) {
    const tbody = document.getElementById('projectTable');
    if (!dataset.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-3)">No projects found.</td></tr>';
        return;
    }
    tbody.innerHTML = dataset.map(p => {
        const initial = p.name.trim().charAt(0).toUpperCase();
        const date = formatDate(p.created_at);
        const clientHtml = p.client_name
            ? `<div style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);font-size:12px;color:var(--text-2);font-weight:500">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                ${p.client_name}${p.client_company ? ` <span style="color:var(--text-3)">· ${p.client_company}</span>` : ''}
               </div>`
            : `<span style="color:var(--text-3);font-size:13px">—</span>`;
        return `<tr style="transition:background .1s" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background=''">
            <td style="padding:14px 20px;border-bottom:1px solid var(--border)">
                <div style="display:flex;align-items:center;gap:13px">
                    <span style="width:38px;height:38px;border-radius:10px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-weight:700;font-size:14px;font-family:'Space Grotesk',sans-serif;flex:none">${initial}</span>
                    <a href="project-details.html?id=${p.id}" style="font-weight:600;font-size:14.5px;text-decoration:none;color:var(--text)">${p.name}</a>
                </div>
            </td>
            <td style="padding:14px 16px;border-bottom:1px solid var(--border)">${clientHtml}</td>
            <td style="padding:14px 16px;border-bottom:1px solid var(--border);font-size:13.5px;color:var(--text-2);font-family:'IBM Plex Mono',monospace">${date}</td>
            <td style="padding:14px 16px;border-bottom:1px solid var(--border)">
                <span class="rd-status-active"><span style="width:6px;height:6px;border-radius:50%;background:var(--good)"></span>Active</span>
            </td>
            <td style="padding:14px 20px;border-bottom:1px solid var(--border)">
                <div style="display:flex;gap:7px;justify-content:flex-end">
                    <a href="project-details.html?id=${p.id}" class="rd-icon-btn" title="Open">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h6v6"/><path d="M20 4l-9 9"/><path d="M18 14v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4"/></svg>
                    </a>
                    <button onclick='editProject(${JSON.stringify(p).replace(/'/g,"&#39;")})' class="rd-icon-btn" title="Edit">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 3.5l4 4L7 21l-4 1 1-4z"/></svg>
                    </button>
                    <button onclick="deleteProject(${p.id}, '${p.name.replace(/'/g,"\\'")}')" class="rd-icon-btn danger" title="Delete">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/></svg>
                    </button>
                </div>
            </td>
        </tr>`;
    }).join('');
}

document.getElementById('searchProjects').addEventListener('input', applyFilters);
document.getElementById('clientFilter').addEventListener('change', applyFilters);

function showAddModal() {
    document.getElementById('projectForm').reset();
    document.getElementById('modalTitle').textContent = 'Create New Project';
    document.getElementById('saveProjectBtn').textContent = 'Create Project';
    currentEditProjectId = null;
    populateClientDropdown();
    // Pre-select client if filtered
    const clientId = document.getElementById('clientFilter').value;
    if (clientId) document.getElementById('p_client_id').value = clientId;
    document.getElementById('addProjectModal').style.display = 'flex';
}

function editProject(p) {
    document.getElementById('projectForm').reset();
    document.getElementById('modalTitle').textContent = 'Edit Project';
    document.getElementById('saveProjectBtn').textContent = 'Save Changes';
    currentEditProjectId = p.id;
    document.getElementById('p_name').value = p.name || '';
    document.getElementById('p_desc').value = p.description || '';
    populateClientDropdown(p.client_id);
    document.getElementById('addProjectModal').style.display = 'flex';
}

function hideAddModal() {
    document.getElementById('addProjectModal').style.display = 'none';
}

async function saveProject() {
    const name = document.getElementById('p_name').value.trim();
    if (!name) { Swal.fire({ icon:'warning', title:'Name required', text:'Please enter a project name.', confirmButtonColor:'var(--accent)' }); return; }
    const client_id = document.getElementById('p_client_id').value || null;
    const description = document.getElementById('p_desc').value.trim();
    const btn = document.getElementById('saveProjectBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    let url = rdApi('api/projects.php'), method = 'POST';
    if (currentEditProjectId) { url += `?id=${currentEditProjectId}`; method = 'PUT'; }
    try {
        await fetch(url, { method, headers:{'Content-Type':'application/json'}, credentials:'same-origin', body:JSON.stringify({ name, description, client_id }) });
        hideAddModal();
        loadProjects();
    } catch(e) {
        Swal.fire({ icon:'error', title:'Network error', text:'Could not reach server.', confirmButtonColor:'var(--accent)' });
    }
    btn.disabled = false;
}

async function deleteProject(id, name) {
    const result = await Swal.fire({
        title: 'Delete project?',
        html: `<b>${name}</b> and ALL related domains, hosting, maintenance, backups, and tasks will be permanently removed.`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: 'var(--bad)',
        cancelButtonColor: 'var(--surface-2)',
        confirmButtonText: 'Yes, delete all',
        cancelButtonText: 'Cancel'
    });
    if (!result.isConfirmed) return;
    await fetch(rdApi(`api/projects.php?id=${id}`), { method:'DELETE', credentials:'same-origin' });
    loadProjects();
}

window.location.href = 'login.html';
});

const preselectedClientId = new URLSearchParams(window.location.search).get('client_id');

async function init() {
    await loadClients();
    if (preselectedClientId) {
        document.getElementById('clientFilter').value = preselectedClientId;
    }
    await loadProjects();
}

init();
</script>
</body>
</html>
