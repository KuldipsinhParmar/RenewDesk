<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - RenewDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f4f6f9; color: #2d3436; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #b2bec3; border-radius: 4px; }
        
        .navbar-custom {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .navbar-brand { font-weight: 700; color: #2d3436; font-size: 1.4rem; letter-spacing: -0.5px; }
        .nav-link { color: #636e72 !important; font-weight: 500; transition: color 0.3s ease, transform 0.2s ease; padding: 0.5rem 1rem;}
        .nav-link:hover { color: #0984e3 !important; transform: translateY(-1px); }
        .nav-link.active { color: #0984e3 !important; font-weight: 600; }
        .nav-icon { background: linear-gradient(135deg, #0984e3, #6c5ce7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block;}
        
        .page-content { padding: 40px 0; min-height: calc(100vh - 76px); }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        
        .table-custom { border-collapse: separate; border-spacing: 0 10px; width: 100%; }
        .table-custom thead th { border: none; text-transform: uppercase; font-size: 11px; color: #b2bec3; letter-spacing: 1px; padding: 10px 20px; font-weight: 600; }
        .table-custom tbody tr { background: #fff; box-shadow: 0 3px 10px rgba(0,0,0,0.02); border-radius: 12px; transition: transform 0.2s; }
        .table-custom tbody tr:hover { transform: scale(1.01) translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .table-custom td { border: none; padding: 18px 20px; vertical-align: middle; color: #2d3436; font-weight: 500;}
        .table-custom tbody tr td:first-child { border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        .table-custom tbody tr td:last-child { border-top-right-radius: 12px; border-bottom-right-radius: 12px; }
        
        .badge { padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 11px; letter-spacing: 0.5px;}
        .bg-success-soft { background: rgba(0,184,148,0.1); color: #00b894; border: 1px solid rgba(0,184,148,0.2); }
        .bg-secondary-soft { background: rgba(99,110,114,0.1); color: #636e72; border: 1px solid rgba(99,110,114,0.2);}
        
        .btn-gradient { background: linear-gradient(135deg, #0984e3, #6c5ce7); border: none; color: white; padding: 8px 20px; border-radius: 8px; font-weight: 500; transition: all 0.3s; }
        .btn-gradient:hover { box-shadow: 0 8px 15px rgba(108, 92, 231, 0.3); color: white; transform: translateY(-2px); }
        
        .search-box { background: #fff; border-radius: 50px; padding: 5px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); display: flex; align-items: center; width: 300px; border: 1px solid rgba(0,0,0,0.05);}
        .search-box input { border: none; box-shadow: none; outline: none; background: transparent; width: 100%; padding-left: 10px; font-weight: 500;}
        
        .modal-content { border-radius: 16px; border: none; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); }
        .modal-header { border-bottom: 1px solid #f0f2f5; padding: 20px 25px; }
        .modal-footer { border-top: 1px solid #f0f2f5; padding: 15px 25px; }
        .form-control { border-radius: 8px; border: 1px solid #dfe6e9; padding: 12px; transition: border-color 0.3s; }
        .form-control:focus { border-color: #0984e3; box-shadow: 0 0 0 0.25rem rgba(9, 132, 227, 0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom sticky-top py-3">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
        <i class="bi bi-shield-lock-fill nav-icon fs-3 me-2"></i> RenewDesk
    </a>
    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navContent">
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-3">
        <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-1"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="projects.html"><i class="bi bi-folder-fill me-1"></i> Projects</a></li>
        <li class="nav-item"><a class="nav-link" href="logs.html"><i class="bi bi-clock-history me-1"></i> Logs</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
        <a href="settings.html" class="nav-link p-0"><i class="bi bi-gear-fill fs-5"></i></a>
        <button class="btn btn-gradient btn-sm" id="logoutBtn"><i class="bi bi-box-arrow-right me-1"></i> Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="page-content">
    <div class="container fade-in">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5 gap-3">
            <div>
                <h2 class="fw-bold mb-1">Projects Portfolio</h2>
                <p class="text-muted mb-0">Manage clients, domains, hosting, and AMC contracts.</p>
            </div>
            
            <div class="d-flex flex-column flex-sm-row gap-3 align-items-center">
                <div class="search-box">
                    <i class="bi bi-search text-muted"></i>
                    <input type="text" id="searchProjects" placeholder="Search projects...">
                </div>
                <button class="btn btn-gradient w-100 w-sm-auto text-nowrap" onclick="showAddModal()"><i class="bi bi-plus-lg me-1"></i> Create Project</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table-custom">
                <thead>
                    <tr>
                        <th width="80">ID</th>
                        <th>Project Name</th>
                        <th>Created On</th>
                        <th>Status</th>
                        <th class="text-end" width="200">Actions</th>
                    </tr>
                </thead>
                <tbody id="projectTable">
                    <tr><td colspan="5" class="text-center text-muted bg-white border-0 py-5 rounded-3 shadow-sm">Loading projects...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add Project Modal -->
<div class="modal fade" id="addProjectModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold">Create New Project</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="projectForm">
            <div class="mb-4">
                <label class="form-label fw-bold text-muted small text-uppercase">Project Name <span class="text-danger">*</span></label>
                <input type="text" id="p_name" class="form-control form-control-lg fs-6" placeholder="e.g. Acme Corp Restructure" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold text-muted small text-uppercase">Description / Notes</label>
                <textarea id="p_desc" class="form-control" rows="4" placeholder="Brief details about the client or project scope..."></textarea>
            </div>
        </form>
      </div>
      <div class="modal-footer pb-4 px-4 bg-light bg-opacity-50">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-gradient px-4" onclick="saveProject()">Create Project</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const modal = new bootstrap.Modal(document.getElementById('addProjectModal'));
let projectsData = [];

async function loadProjects() {
    try {
        const res = await fetch('/api/projects.php');
        if (res.status === 401) window.location.href = 'login.html';
        const data = await res.json();
        projectsData = data.data;
        renderProjects(projectsData);
    } catch(e) {
        console.error("Failed to load projects", e);
    }
}

function renderProjects(dataset) {
    const tbody = document.getElementById('projectTable');
    tbody.innerHTML = '';
    
    if (dataset.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted border-0 bg-white py-5 shadow-sm rounded-3"><i class="bi bi-folder-x fs-1 d-block mb-3 text-secondary"></i>No projects found matching criteria.</td></tr>';
        return;
    }

    dataset.forEach(p => {
        let badge = p.status === 'active' ? 'bg-success-soft' : 'bg-secondary-soft';
        let date = new Date(p.created_at).toLocaleDateString('en-GB', {day: 'numeric', month: 'short', year: 'numeric'});
        
        tbody.innerHTML += `
            <tr>
                <td class="text-muted">#${p.id}</td>
                <td>
                    <div class="d-flex align-items-center">
                        <div class="rounded bg-light d-flex align-items-center justify-content-center me-3" style="width: 45px; height: 45px;"><i class="bi bi-folder2 text-primary fs-4"></i></div>
                        <div><strong class="fs-6 d-block">${p.name}</strong></div>
                    </div>
                </td>
                <td class="text-muted">${date}</td>
                <td><span class="badge ${badge}">${p.status.toUpperCase()}</span></td>
                <td class="text-end">
                    <a href="project-details.html?id=${p.id}" class="btn btn-light btn-sm rounded-pill px-3 shadow-sm me-1 hover-lift" style="transition:all 0.2s;"><i class="bi bi-gear"></i> Manage</a>
                    <button class="btn btn-light btn-sm text-danger rounded-circle shadow-sm" style="width:32px; height:32px; padding:0;" onclick="deleteProject(${p.id})"><i class="bi bi-trash"></i></button>
                </td>
            </tr>
        `;
    });
}

document.getElementById('searchProjects').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = projectsData.filter(p => p.name.toLowerCase().includes(term));
    renderProjects(filtered);
});

function showAddModal() {
    document.getElementById('projectForm').reset();
    modal.show();
}

async function saveProject() {
    const name = document.getElementById('p_name').value;
    const desc = document.getElementById('p_desc').value;
    
    if(!name) return alert("Project Name is required");

    await fetch('/api/projects.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, description: desc })
    });
    
    modal.hide();
    loadProjects();
}

async function deleteProject(id) {
    if(confirm("Are you sure you want to delete this project? ALL related domains & hosting will be removed permanently!")) {
        await fetch(`/api/projects.php?id=${id}`, { method: 'DELETE' });
        loadProjects();
    }
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout.php', { method: 'POST' });
    window.location.href = 'login.html';
});

loadProjects();
</script>

</body>
</html>
