<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - RenewDesk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background-color: #212529; color: white; padding-top: 20px; flex-shrink: 0; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 10px 20px; transition: 0.2s; }
        .sidebar a:hover, .sidebar a.active { background-color: #343a40; color: white; border-left: 3px solid #0d6efd; }
        .content { flex-grow: 1; padding: 30px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="text-center mb-4"><i class="bi bi-shield-lock text-primary"></i> RenewDesk</h4>
    <a href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
    <a href="projects.html" class="active"><i class="bi bi-folder me-2"></i> Projects</a>
    <a href="settings.html"><i class="bi bi-gear me-2"></i> Settings</a>
    <hr class="text-secondary mx-3">
    <a href="#" id="logoutBtn"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
</div>

<div class="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Projects Management</h2>
        <button class="btn btn-primary" onclick="showAddModal()"><i class="bi bi-plus-circle"></i> Add Project</button>
    </div>

    <div class="bg-white p-3 rounded shadow-sm">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Project Name</th>
                    <th>Status</th>
                    <th>Created</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="projectTable">
                <tr><td colspan="5" class="text-center text-muted">Loading...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Add Project Modal -->
<div class="modal fade" id="addProjectModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Create New Project</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="projectForm">
            <div class="mb-3">
                <label class="form-label">Project Name</label>
                <input type="text" id="p_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description / Notes</label>
                <textarea id="p_desc" class="form-control" rows="3"></textarea>
            </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" onclick="saveProject()">Save Project</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const modal = new bootstrap.Modal(document.getElementById('addProjectModal'));

async function loadProjects() {
    const res = await fetch('/api/projects.php');
    if (res.status === 401) window.location.href = 'login.html';
    const data = await res.json();
    
    const tbody = document.getElementById('projectTable');
    tbody.innerHTML = '';
    
    if (data.data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No projects found.</td></tr>';
        return;
    }

    data.data.forEach(p => {
        let badge = p.status === 'active' ? 'bg-success' : 'bg-secondary';
        let date = new Date(p.created_at).toISOString().split('T')[0];
        tbody.innerHTML += `
            <tr>
                <td>${p.id}</td>
                <td><strong>${p.name}</strong></td>
                <td><span class="badge ${badge}">${p.status.toUpperCase()}</span></td>
                <td>${date}</td>
                <td>
                    <a href="project-details.html?id=${p.id}" class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i> Manage</a>
                    <button class="btn btn-sm btn-outline-danger" onclick="deleteProject(${p.id})"><i class="bi bi-trash"></i></button>
                </td>
            </tr>
        `;
    });
}

function showAddModal() {
    document.getElementById('projectForm').reset();
    modal.show();
}

async function saveProject() {
    const name = document.getElementById('p_name').value;
    const desc = document.getElementById('p_desc').value;
    
    if(!name) return alert("Name is required");

    await fetch('/api/projects.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, description: desc })
    });
    
    modal.hide();
    loadProjects();
}

async function deleteProject(id) {
    if(confirm("Are you sure you want to delete this project? ALL related domains & hosting will be removed!")) {
        await fetch(`/api/projects.php?id=${id}`, { method: 'DELETE' });
        loadProjects();
    }
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout.php', { method: 'POST' });
    window.location.href = 'login.html';
});

loadProjects();
</script>

</body>
</html>
