<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Projects - RenewDesk Executive Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b6cee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#0a0e17",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
        }
        .sidebar-item-active {
            background: linear-gradient(90deg, rgba(43, 108, 238, 0.15) 0%, rgba(43, 108, 238, 0) 100%);
            border-left: 3px solid #2b6cee;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased h-screen overflow-hidden flex flex-col">

<!-- Top Navigation -->
<nav class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/80 backdrop-blur-xl flex-shrink-0 z-50 flex items-center justify-between px-6 sticky top-0 shadow-sm shadow-slate-200/20 dark:shadow-none transition-all">
    <div class="flex items-center gap-8 h-full">
        <!-- Logo -->
        <div class="flex items-center gap-3 relative z-10 group cursor-pointer transition-transform hover:scale-[1.02]">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-blue-400 flex items-center justify-center text-white shadow-[0_0_15px_rgba(43,108,238,0.3)]">
                <span class="material-symbols-outlined text-[18px]">autorenew</span>
            </div>
            <h1 class="text-lg font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-500 dark:from-white dark:to-slate-400 leading-none">RenewDesk</h1>
        </div>

        <!-- Links -->
        <div class="hidden lg:flex items-center h-full gap-2">
            <a href="dashboard.html" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-semibold transition-all text-slate-500 hover:bg-slate-100 hover:text-slate-800 dark:text-slate-400 dark:hover:bg-slate-800/50 dark:hover:text-white"><span class="material-symbols-outlined text-[18px]">dashboard</span> Dashboard</a>
            <a href="projects.html" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-semibold transition-all bg-primary/10 text-primary border border-primary/20"><span class="material-symbols-outlined text-[18px]">folder</span> Projects</a>
            <a href="domains.html" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-semibold transition-all text-slate-500 hover:bg-slate-100 hover:text-slate-800 dark:text-slate-400 dark:hover:bg-slate-800/50 dark:hover:text-white"><span class="material-symbols-outlined text-[18px]">language</span> Domains</a>
            <a href="hosting.html" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-semibold transition-all text-slate-500 hover:bg-slate-100 hover:text-slate-800 dark:text-slate-400 dark:hover:bg-slate-800/50 dark:hover:text-white"><span class="material-symbols-outlined text-[18px]">dns</span> Hosting</a>
            <a href="maintenance.html" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-semibold transition-all text-slate-500 hover:bg-slate-100 hover:text-slate-800 dark:text-slate-400 dark:hover:bg-slate-800/50 dark:hover:text-white"><span class="material-symbols-outlined text-[18px]">engineering</span> Maintenance</a>
            <a href="backups.html" class="flex items-center gap-2 px-3 py-1.5 rounded-md text-sm font-semibold transition-all text-slate-500 hover:bg-slate-100 hover:text-slate-800 dark:text-slate-400 dark:hover:bg-slate-800/50 dark:hover:text-white"><span class="material-symbols-outlined text-[18px]">backup</span> Backups</a>
        </div>
    </div>

    <!-- Right Side Actions -->
    <div class="flex items-center gap-3">
        <a href="logs.html" class="text-slate-500 hover:text-slate-800 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800/50 dark:hover:text-white w-8 h-8 rounded-lg flex items-center justify-center transition-all" title="Logs"><span class="material-symbols-outlined text-[20px]">history</span></a>
        <a href="settings.html" class="text-slate-500 hover:text-slate-800 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800/50 dark:hover:text-white w-8 h-8 rounded-lg flex items-center justify-center transition-all" title="Settings"><span class="material-symbols-outlined text-[20px]">settings</span></a>
        
        <div class="hidden sm:block w-[1px] h-5 bg-slate-200 dark:bg-slate-700 mx-1"></div>
        
        <div class="hidden sm:flex items-center gap-2 mr-2">
            <div class="w-8 h-8 rounded-full border border-slate-200 dark:border-slate-700 p-0.5 flex items-center justify-center bg-slate-100 dark:bg-slate-800 text-xs font-bold text-slate-600 dark:text-slate-300 shadow-sm">AD</div>
            <div class="text-left">
                <p class="text-xs font-bold text-slate-900 dark:text-white leading-tight">Admin</p>
                <p class="text-[10px] text-slate-500 uppercase tracking-tighter font-semibold">IT Manager</p>
            </div>
        </div>
        
        <button id="logoutBtn" class="flex items-center justify-center w-8 h-8 rounded-lg text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors" title="Logout"><span class="material-symbols-outlined text-[20px]">logout</span></button>
    </div>
</nav>

    

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden bg-background-light dark:bg-background-dark relative">
        <!-- Header -->
        <header class="h-20 border-b border-slate-200 dark:border-slate-800 px-8 flex items-center justify-between bg-white/50 dark:bg-background-dark/50 backdrop-blur-md z-10">
            <div>
                <h2 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Projects Portfolio</h2>
            </div>
            <div class="flex items-center gap-4">
                
            </div>
        </header>

        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto p-8 custom-scrollbar z-10 relative">
            <div class="flex items-center justify-between mb-8">
                <div class="relative w-96">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">search</span>
                    <input id="searchProjects" class="w-full bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl pl-10 pr-4 py-2.5 text-sm focus:ring-2 focus:ring-primary/40 focus:border-primary/40 dark:text-slate-200 shadow-sm transition-all" placeholder="Search projects..." type="text"/>
                </div>
                <button onclick="showAddModal()" class="flex items-center gap-2 bg-primary px-5 py-2.5 rounded-xl text-white font-bold text-sm shadow-xl shadow-primary/20 hover:scale-[1.02] transition-transform">
                    <span class="material-symbols-outlined text-lg">add</span>
                    Create Project
                </button>
            </div>
            
            <div class="glass-card rounded-2xl overflow-hidden border-slate-200 dark:border-slate-800">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-slate-100 dark:bg-slate-800/50">
                            <th class="text-left py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Project Name</th>
                            <th class="text-left py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Created On</th>
                            <th class="text-left py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Status</th>
                            <th class="text-right py-4 px-6 text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 w-64">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100 dark:divide-slate-800" id="projectTable">
                        <tr><td colspan="4" class="text-center py-6 text-slate-500">Loading projects...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Footer area with decorative glow -->
            <div class="fixed bottom-0 right-0 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px] pointer-events-none -z-20 translate-x-1/2 translate-y-1/2"></div>
        </div>
    </main>
</div>

<!-- Modal -->
<div id="addProjectModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm transition-opacity">
    <div class="bg-white dark:bg-[#131b2c] w-full max-w-lg rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-700 overflow-hidden transform transition-all">
        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between bg-slate-50 dark:bg-[#0a0e17]">
            <h3 class="text-lg font-bold text-slate-900 dark:text-white" id="modalTitle">Create New Project</h3>
            <button onclick="hideAddModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-white transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div class="p-6">
            <form id="projectForm">
                <div class="mb-5">
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Project Name <span class="text-red-500">*</span></label>
                    <input type="text" id="p_name" class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/40 focus:border-primary/40 dark:text-white transition-colors outline-none" placeholder="e.g. Acme Corp Restructure" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-2">Description / Notes</label>
                    <textarea id="p_desc" rows="4" class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary/40 focus:border-primary/40 dark:text-white transition-colors outline-none" placeholder="Brief details about the client or project scope..."></textarea>
                </div>
            </form>
        </div>
        <div class="px-6 py-4 border-t border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-[#0a0e17] flex justify-end gap-3">
            <button onclick="hideAddModal()" class="px-5 py-2.5 rounded-xl text-slate-600 dark:text-slate-300 font-semibold text-sm hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">Cancel</button>
            <button onclick="saveProject()" id="saveProjectBtn" class="bg-primary px-6 py-2.5 rounded-xl text-white font-bold text-sm shadow-xl shadow-primary/20 hover:scale-[1.02] transition-transform">Create Project</button>
        </div>
    </div>
</div>

<script>
let projectsData = [];
let currentEditProjectId = null;

async function loadProjects() {
    try {
        const res = await fetch('/api/projects.php');
        if (res.status === 401) window.location.href = 'login.html';
        const data = await res.json();
        projectsData = data.data;
        renderProjects(projectsData);
    } catch(e) {
        console.error("Failed to load projects", e);
    }
}

function renderProjects(dataset) {
    const tbody = document.getElementById('projectTable');
    tbody.innerHTML = '';
    
    if (dataset.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center py-10 text-slate-500 dark:text-slate-400"><span class="material-symbols-outlined text-4xl block mb-2 text-slate-300 dark:text-slate-600">folder_off</span>No projects found matching criteria.</td></tr>';
        return;
    }

    dataset.forEach(p => {
        let badge = p.status === 'active' ? 'bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 border border-emerald-500/20' : 'bg-slate-500/10 text-slate-600 dark:text-slate-400 border border-slate-500/20';
        let d = new Date(p.created_at);
        let date = `${d.getDate().toString().padStart(2,'0')}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getFullYear()}`;
        
        tbody.innerHTML += `
            <tr class="hover:bg-slate-50 dark:hover:bg-white/5 transition-colors">
                <td class="py-4 px-6">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
                            <span class="material-symbols-outlined text-sm">folder</span>
                        </div>
                        <span class="font-semibold text-sm text-slate-900 dark:text-white">${p.name}</span>
                    </div>
                </td>
                <td class="py-4 px-6 text-sm text-slate-500 dark:text-slate-400">${date}</td>
                <td class="py-4 px-6">
                    <span class="px-3 py-1 rounded-full text-[11px] font-bold ${badge}">${p.status.toUpperCase()}</span>
                </td>
                <td class="py-4 px-6 text-right space-x-2">
                    <a href="project-details.html?id=${p.id}" class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 hover:text-primary transition-all shadow-sm" title="Manage Project">
                        <span class="material-symbols-outlined text-[18px]">open_in_new</span>
                    </a>
                    <button onclick='editProject(${JSON.stringify(p).replace(/'/g, "&#39;")})' class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-amber-50 dark:bg-amber-500/10 text-amber-500 hover:bg-amber-100 dark:hover:bg-amber-500/20 transition-colors">
                        <span class="material-symbols-outlined text-[16px]">edit</span>
                    </button>
                    <button onclick="deleteProject(${p.id})" class="inline-flex items-center justify-center w-8 h-8 rounded-lg bg-red-50 dark:bg-red-500/10 text-red-500 hover:bg-red-100 dark:hover:bg-red-500/20 transition-colors">
                        <span class="material-symbols-outlined text-[16px]">delete</span>
                    </button>
                </td>
            </tr>
        `;
    });
}

document.getElementById('searchProjects').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = projectsData.filter(p => p.name.toLowerCase().includes(term));
    renderProjects(filtered);
});

function showAddModal() {
    document.getElementById('projectForm').reset();
    document.getElementById('modalTitle').innerText = 'Create New Project';
    document.getElementById('saveProjectBtn').innerText = 'Create Project';
    currentEditProjectId = null;
    document.getElementById('addProjectModal').classList.remove('hidden');
}

function editProject(project) {
    document.getElementById('projectForm').reset();
    document.getElementById('modalTitle').innerText = 'Edit Project';
    document.getElementById('saveProjectBtn').innerText = 'Save Changes';
    currentEditProjectId = project.id;
    document.getElementById('p_name').value = project.name;
    document.getElementById('p_desc').value = project.description || '';
    document.getElementById('addProjectModal').classList.remove('hidden');
}

function hideAddModal() {
    document.getElementById('addProjectModal').classList.add('hidden');
}

async function saveProject() {
    const name = document.getElementById('p_name').value;
    const desc = document.getElementById('p_desc').value;
    
    if(!name) return alert("Project Name is required");

    let url = '/api/projects.php';
    let method = 'POST';
    if(currentEditProjectId) {
        url += `?id=${currentEditProjectId}`;
        method = 'PUT';
    }

    await fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, description: desc })
    });
    
    hideAddModal();
    loadProjects();
}

async function deleteProject(id) {
    if(confirm("Are you sure you want to delete this project? ALL related domains & hosting will be removed permanently!")) {
        await fetch(`/api/projects.php?id=${id}`, { method: 'DELETE' });
        loadProjects();
    }
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout.php', { method: 'POST' });
    window.location.href = 'login.html';
});

loadProjects();
</script>
</body>
</html>
