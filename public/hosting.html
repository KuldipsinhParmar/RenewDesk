<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Hosting - RenewDesk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="assets/css/v2.css">
</head>
<body class="rd-body">
<div class="rd-layout">

    <!-- SIDEBAR -->
    <aside class="rd-sidebar">
        <div class="rd-sidebar-logo">
            <div class="rd-logo-icon"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg></div>
            <span class="rd-logo-text">RenewDesk</span>
        </div>
        <div class="rd-nav-label">Workspace</div>
        <nav class="rd-nav">
            <a href="dashboard.html" class="rd-nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></svg>Dashboard</a>
            <a href="projects.html" class="rd-nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Projects</a>
        </nav>
        <div class="rd-nav-label">Assets</div>
        <nav class="rd-nav">
            <a href="domains.html" class="rd-nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.6 2.6 2.6 15.4 0 18M12 3c-2.6 2.6-2.6 15.4 0 18"/></svg>Domains</a>
            <a href="hosting.html" class="rd-nav-item active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="7" rx="1.8"/><rect x="3" y="13" width="18" height="7" rx="1.8"/><path d="M7 7.5h.01M7 16.5h.01"/></svg>Hosting</a>
            <a href="maintenance.html" class="rd-nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a3.7 3.7 0 0 0-5 4.9L4 17v3h3l5.8-5.7a3.7 3.7 0 0 0 4.9-5l-2.5 2.5-2.2-2.2z"/></svg>Maintenance</a>
            <a href="backups.html" class="rd-nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 18a4 4 0 0 1-.5-7.97 6 6 0 0 1 11.6 1.4A3.5 3.5 0 0 1 17 18z"/></svg>Backups</a>
            <a href="tasks.html" class="rd-nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.5 12.3l2.4 2.4 4.6-5"/></svg>Tasks</a>
        </nav>
        <div class="rd-sidebar-footer">
            <div class="rd-user-row">
                <div class="rd-user-avatar">AD</div>
                <div class="rd-user-info"><div class="rd-user-name">Admin</div><div class="rd-user-role">IT Manager</div></div>
                <button id="logoutBtn" class="rd-logout-btn" title="Sign out"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h3"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg></button>
            </div>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="rd-main">
        <div class="rd-page-header">
            <div><h1 class="rd-page-title">All Hosting Plans</h1><p class="rd-page-subtitle">Manage hosting renewals across all projects</p></div>
        </div>

        <div class="rd-toolbar">
            <div class="rd-search-wrap">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
                <input id="searchData" class="rd-search-input" placeholder="Search hosting…" type="text"/>
            </div>
            <select id="yearFilter" class="rd-filter-select"><option value="">All Years</option></select>
        </div>

        <div class="rd-card">
            <table style="width:100%;border-collapse:collapse">
                <thead><tr>
                    <th style="padding:12px 20px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Plan & Provider</th>
                    <th style="padding:12px 20px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Project</th>
                    <th style="padding:12px 20px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Renewal Date</th>
                    <th style="padding:12px 20px;text-align:right;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Price</th>
                    <th style="padding:12px 20px;text-align:center;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Status</th>
                    <th style="padding:12px 20px;text-align:right;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Actions</th>
                </tr></thead>
                <tbody id="dataTable">
                    <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-3)">Loading hosting plans…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="assets/js/rd-api.js"></script>
<script>
let listData = [];

async function loadData() {
    try {
        const res = await fetch(rdApi('api/hosting.php'), { credentials: 'same-origin' });
        if (res.status === 401) { window.location.href = 'login.html'; return; }
        const data = await res.json();
        listData = data.data;
        populateYearFilter();
        const currentYear = new Date().getFullYear().toString();
        const yearSelect = document.getElementById('yearFilter');
        if ([...yearSelect.options].some(opt => opt.value === currentYear)) yearSelect.value = currentYear;
        filterData();
    } catch(e) { console.error("Failed to load hosting", e); }
}

function formatD(d) {
    if (!d) return '—';
    let dt = new Date(d);
    return `${dt.getDate().toString().padStart(2,'0')}-${(dt.getMonth()+1).toString().padStart(2,'0')}-${dt.getFullYear()}`;
}

function paidPill(paid) {
    return paid == 1
        ? `<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;background:var(--good-soft);color:var(--good);font-size:11.5px;font-weight:700"><span style="width:6px;height:6px;border-radius:50%;background:var(--good)"></span>Paid</span>`
        : `<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;background:var(--bad-soft);color:var(--bad);font-size:11.5px;font-weight:700"><span style="width:6px;height:6px;border-radius:50%;background:var(--bad)"></span>Due</span>`;
}

function dateColor(paid, dateStr) {
    if (paid == 1) return 'var(--good)';
    return new Date(dateStr) < new Date() ? 'var(--bad)' : 'var(--good)';
}

function renderData(dataset) {
    const tbody = document.getElementById('dataTable');
    if (dataset.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-3)">No hosting plans found.</td></tr>';
        return;
    }
    tbody.innerHTML = dataset.map(item => `
        <tr style="transition:background .1s" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background=''">
            <td style="padding:14px 20px;border-bottom:1px solid var(--border)">
                <div style="font-weight:600;font-size:14px">${item.plan_name}</div>
                <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em">${item.provider || '—'}</div>
            </td>
            <td style="padding:14px 20px;border-bottom:1px solid var(--border);font-size:13.5px;color:var(--text-2)">
                <a href="project-details.html?id=${item.project_id}" style="color:var(--text-2);text-decoration:none;font-weight:500" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-2)'">${item.project_name}</a>
            </td>
            <td style="padding:14px 20px;border-bottom:1px solid var(--border);font-size:13.5px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:${dateColor(item.client_paid,item.renewal_date)}">${formatD(item.renewal_date)}</td>
            <td style="padding:14px 20px;border-bottom:1px solid var(--border);text-align:right;font-size:13.5px;font-weight:700;font-family:'IBM Plex Mono',monospace">₹${new Intl.NumberFormat('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}).format(item.price)}</td>
            <td style="padding:14px 20px;border-bottom:1px solid var(--border);text-align:center">${paidPill(item.client_paid)}</td>
            <td style="padding:14px 20px;border-bottom:1px solid var(--border)">
                <div style="display:flex;gap:7px;justify-content:flex-end">
                    ${item.client_paid == 1 ? '' : `<button onclick="markRenewed(${item.id},'${item.renewal_date}')" class="rd-icon-btn success" title="Mark Renewed"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.5 12.3l2.4 2.4 4.6-5"/></svg></button>`}
                    <a href="project-details.html?id=${item.project_id}" class="rd-icon-btn" title="Open Project"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h6v6"/><path d="M20 4l-9 9"/><path d="M18 14v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4"/></svg></a>
                </div>
            </td>
        </tr>`).join('');
}

function populateYearFilter() {
    const yearSelect = document.getElementById('yearFilter');
    const years = [...new Set(listData.map(i => new Date(i.renewal_date).getFullYear()))].filter(y => y && !isNaN(y) && y > 2000).sort((a,b)=>b-a);
    yearSelect.innerHTML = '<option value="">All Years</option>' + years.map(y=>`<option value="${y}">${y}</option>`).join('');
}

function filterData() {
    const term = document.getElementById('searchData').value.toLowerCase();
    const year = document.getElementById('yearFilter').value;
    renderData(listData.filter(p => {
        const matchesTerm = p.plan_name.toLowerCase().includes(term) || (p.project_name && p.project_name.toLowerCase().includes(term));
        const matchesYear = year === '' || new Date(p.renewal_date).getFullYear().toString() === year;
        return matchesTerm && matchesYear;
    }));
}

document.getElementById('searchData').addEventListener('input', filterData);
document.getElementById('yearFilter').addEventListener('change', filterData);

async function markRenewed(id, oldDate) {
    const result = await Swal.fire({ title:'Renew Hosting?', text:'Extend the renewal date by 1 year and mark as paid.', icon:'question', showCancelButton:true, confirmButtonColor:'#0f9d76', cancelButtonColor:'#df433f', confirmButtonText:'Yes, Renew!' });
    if (!result.isConfirmed) return;
    let dt = new Date(oldDate); dt.setFullYear(dt.getFullYear()+1);
    const newDate = dt.toISOString().split('T')[0];
    try {
        const item = listData.find(x=>x.id==id);
        await fetch(rdApi(`api/hosting.php?id=${id}`), { method:'PUT', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body:JSON.stringify({...item,client_paid:1,status:'renewed'}) });
        await fetch(rdApi('api/hosting.php'), { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body:JSON.stringify({project_id:item.project_id,provider:item.provider,plan_name:item.plan_name,renewal_date:newDate,price:item.price,client_paid:0,status:'active',notes:item.notes}) });
        Swal.fire({ title:'Done!', text:'Hosting renewed.', icon:'success', timer:1800, showConfirmButton:false });
        loadData();
    } catch(e) { Swal.fire('Error','Failed to renew.','error'); }
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch(rdApi('api/auth/logout.php'), { method:'POST', credentials:'same-origin' });
    window.location.href = 'login.html';
});

loadData();
</script>
</body>
</html>
