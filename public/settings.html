<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Settings - RenewDesk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <script src="assets/js/sidebar.js"></script>
    <link rel="stylesheet" href="assets/css/v2.css">
</head>
<body class="rd-body">
<div class="rd-layout">

    <!-- SIDEBAR -->
    <aside class="rd-sidebar" id="rd-sidebar"></aside>
    <script>rdSidebar.init('settings');</script>

    <!-- MAIN -->
    <div class="rd-main">
        <div class="rd-page-header">
            <button class="rd-menu-btn" onclick="rdSidebar.open()" aria-label="Menu"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
            <div><h1 class="rd-page-title">Settings</h1><p class="rd-page-subtitle">Configure alerts and system preferences</p></div>
        </div>

        <div style="max-width:680px">
            <div id="alertBox" style="display:none;margin-bottom:20px;padding:14px 18px;border-radius:12px;font-size:13.5px;font-weight:600;display:none;align-items:center;gap:10px"></div>

            <form id="settingsForm">
                <div class="rd-card" style="padding:32px;margin-bottom:20px">
                    <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
                        <div style="width:46px;height:46px;border-radius:12px;background:rgba(224,144,42,.13);display:flex;align-items:center;justify-content:center;flex-shrink:0">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--c-amber)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                        </div>
                        <div>
                            <h3 style="font-size:17px;font-weight:700;margin:0 0 3px">Alert Preferences</h3>
                            <p style="font-size:13px;color:var(--text-3);margin:0">Reminders are sent to <strong style="color:var(--text-2)">kuldipparmar18@gmail.com</strong></p>
                        </div>
                    </div>
                    <div style="background:var(--surface-2);border-radius:12px;padding:20px;border:1px solid var(--border)">
                        <div class="rd-form-group">
                            <label class="rd-label">Reminder Thresholds</label>
                            <p style="font-size:12px;color:var(--text-3);margin:0 0 10px">Days before expiry to send alert (comma separated)</p>
                            <input type="text" data-key="remind_days" class="rd-input key-input" placeholder="30,15,7,1">
                        </div>
                    </div>
                </div>

                <div style="display:flex;justify-content:flex-end;gap:12px">
                    <button type="button" id="testEmailBtn" class="rd-btn" style="gap:7px;display:flex;align-items:center;color:var(--good);border-color:var(--good)">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg>
                        Send Test Email
                    </button>
                    <button type="submit" id="saveBtn" class="rd-btn rd-btn-primary" style="display:flex;align-items:center;gap:7px">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                        Save Configuration
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="assets/js/rd-api.js"></script>
<script>
function showAlert(msg, ok) {
    const alertBox = document.getElementById('alertBox');
    alertBox.style.display = 'flex';
    alertBox.style.background = ok ? 'var(--good-soft)' : 'var(--bad-soft)';
    alertBox.style.color = ok ? 'var(--good)' : 'var(--bad)';
    alertBox.style.border = `1px solid ${ok ? 'rgba(22,163,74,.25)' : 'rgba(223,67,63,.25)'}`;
    alertBox.textContent = msg;
    setTimeout(() => { alertBox.style.display = 'none'; }, 5000);
}

async function loadSettings() {
    try {
        const res = await fetch(rdApi('api/settings.php'), { credentials: 'same-origin' });
        if (res.status === 401) { window.location.href = 'login.html'; return; }
        const json = await res.json();
        json.data.forEach(item => {
            const input = document.querySelector(`input[data-key="${item.key}"]`);
            if (input) input.value = item.value;
        });
    } catch(e) { console.error("Could not load settings."); }
}

document.getElementById('settingsForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('saveBtn');
    const orig = btn.innerHTML;
    btn.disabled = true; btn.textContent = 'Saving…';
    const inputs = document.querySelectorAll('.key-input');
    const payload = {};
    inputs.forEach(input => { payload[input.getAttribute('data-key')] = input.value; });
    try {
        const res = await fetch(rdApi('api/settings.php'), { method:'PUT', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body:JSON.stringify(payload) });
        const json = await res.json();
        showAlert(json.status === 'success' ? 'Settings saved successfully!' : (json.message || 'Error saving settings.'), json.status === 'success');
    } catch(e) { showAlert('Network request failed.', false); }
    btn.disabled = false; btn.innerHTML = orig;
});

document.getElementById('testEmailBtn').addEventListener('click', async () => {
    const btn = document.getElementById('testEmailBtn');
    const orig = btn.innerHTML;
    btn.disabled = true; btn.textContent = 'Sending…';
    try {
        const res = await fetch(rdApi('api/test_email.php'), { method:'POST', credentials:'same-origin' });
        const json = await res.json();
        showAlert(json.message || (json.status === 'success' ? 'Test email sent!' : 'SMTP test failed.'), json.status === 'success');
    } catch(e) { showAlert('Server error during test email.', false); }
    btn.disabled = false; btn.innerHTML = orig;
});

loadSettings();
</script>
</body>
</html>
