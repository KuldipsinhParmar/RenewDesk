<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Settings - RenewDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f4f6f9; color: #2d3436; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #b2bec3; border-radius: 4px; }
        
        .navbar-custom {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .navbar-brand { font-weight: 700; color: #2d3436; font-size: 1.4rem; letter-spacing: -0.5px; }
        .nav-link { color: #636e72 !important; font-weight: 500; transition: color 0.3s ease, transform 0.2s ease; padding: 0.5rem 1rem;}
        .nav-link:hover { color: #0984e3 !important; transform: translateY(-1px); }
        .nav-link.active { color: #0984e3 !important; font-weight: 600; }
        .nav-icon { background: linear-gradient(135deg, #0984e3, #6c5ce7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block;}
        
        .page-content { padding: 40px 0; min-height: calc(100vh - 76px); }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        
        .glass-card { background: #fff; border-radius: 16px; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); transition: all 0.3s ease; padding: 30px; margin-bottom: 30px; }
        
        .btn-gradient { background: linear-gradient(135deg, #0984e3, #6c5ce7); border: none; color: white; padding: 10px 24px; border-radius: 8px; font-weight: 500; transition: all 0.3s; }
        .btn-gradient:hover { box-shadow: 0 8px 15px rgba(108, 92, 231, 0.3); color: white; transform: translateY(-2px); }
        .btn-outline-custom { border: 2px solid #00b894; color: #00b894; padding: 8px 24px; border-radius: 8px; font-weight: 600; transition: all 0.3s;}
        .btn-outline-custom:hover { background: rgba(0,184,148,0.1); color: #00b894; transform: translateY(-2px);}

        .form-control { border-radius: 8px; border: 1px solid #dfe6e9; padding: 12px 15px; transition: border-color 0.3s; background: #f8f9fa; font-weight: 500; color: #34495e;}
        .form-control:focus { border-color: #0984e3; box-shadow: 0 0 0 0.25rem rgba(9, 132, 227, 0.1); background: #fff;}
        .form-label { font-weight: 600; color: #636e72; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;}
        
        .bg-light-primary { background-color: rgba(9,132,227,0.05); border-radius: 12px; padding: 20px;}
        .bg-light-warning { background-color: rgba(253,203,110,0.08); border-radius: 12px; padding: 20px;}
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom sticky-top py-3">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
        <i class="bi bi-shield-lock-fill nav-icon fs-3 me-2"></i> RenewDesk
    </a>
    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navContent">
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-3">
        <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-1"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="projects.html"><i class="bi bi-folder-fill me-1"></i> Projects</a></li>
        <li class="nav-item"><a class="nav-link" href="logs.html"><i class="bi bi-clock-history me-1"></i> Logs</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
        <a href="settings.html" class="nav-link p-0 active"><i class="bi bi-gear-fill fs-5"></i></a>
        <button class="btn btn-gradient btn-sm flex-shrink-0" id="logoutBtn"><i class="bi bi-box-arrow-right me-1"></i> Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="page-content">
    <div class="container fade-in" style="max-width: 900px;">
        <h2 class="fw-bold mb-1">Global Settings</h2>
        <p class="text-muted mb-4">Configure email servers and reminder schedules.</p>

        <div id="alertBox" class="alert d-none border-0 shadow-sm rounded-3"></div>

        <form id="settingsForm">
            <div class="glass-card">
                <h4 class="fw-bold mb-4"><i class="bi bi-envelope-at bg-light-primary text-primary px-3 py-2 me-2 rounded d-inline-block"></i> SMTP Configuration</h4>
                
                <div class="row g-4 bg-light-primary m-0">
                    <div class="col-md-8">
                        <label class="form-label">SMTP Host</label>
                        <input type="text" class="form-control key-input shadow-sm" data-key="smtp_host" placeholder="smtp.gmail.com">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">SMTP Port</label>
                        <input type="text" class="form-control key-input shadow-sm" data-key="smtp_port" placeholder="587">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">SMTP Username</label>
                        <input type="text" class="form-control key-input shadow-sm" data-key="smtp_user" placeholder="email@address.com">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">SMTP Password</label>
                        <input type="password" class="form-control key-input shadow-sm" data-key="smtp_pass" placeholder="••••••••">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">From Email</label>
                        <input type="email" class="form-control key-input shadow-sm" data-key="smtp_from_email" placeholder="noreply@renewdesk.app">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">From Name</label>
                        <input type="text" class="form-control key-input shadow-sm" data-key="smtp_from_name" placeholder="RenewDesk System">
                    </div>
                </div>
            </div>

            <div class="glass-card">
                <h4 class="fw-bold mb-4"><i class="bi bi-bell bg-light-warning text-warning px-3 py-2 me-2 rounded d-inline-block"></i> Alert Preferences</h4>
                
                <div class="row g-4 bg-light-warning m-0">
                    <div class="col-md-6">
                        <label class="form-label">Admin Notify Email</label>
                        <div class="form-text mt-0 mb-2">The email address that will receive the reminder logs.</div>
                        <input type="email" class="form-control key-input shadow-sm" data-key="admin_notify_email">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Reminder Thresholds</label>
                        <div class="form-text mt-0 mb-2">Days before expiry to send alert (comma separated).</div>
                        <input type="text" class="form-control key-input shadow-sm" data-key="remind_days" placeholder="30,15,7,1">
                    </div>
                </div>
            </div>

            <div class="glass-card bg-transparent border-0 shadow-none p-0 d-flex gap-3 justify-content-end align-items-center">
                <button type="button" class="btn btn-outline-custom rounded-pill" id="testEmailBtn"><i class="bi bi-send me-1"></i> Send Test Email</button>
                <button type="submit" class="btn btn-gradient rounded-pill" id="saveBtn"><i class="bi bi-save me-1"></i> Save Configuration</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function loadSettings() {
    try {
        const res = await fetch('/api/settings.php');
        if (res.status === 401) window.location.href = 'login.html';
        const json = await res.json();
        
        json.data.forEach(item => {
            const input = document.querySelector(`input[data-key="${item.key}"]`);
            if (input) input.value = item.value;
        });
    } catch(e) { console.error("Could not load settings."); }
}

document.getElementById('settingsForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('saveBtn');
    const alertBox = document.getElementById('alertBox');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Saving...';

    const inputs = document.querySelectorAll('.key-input');
    const payload = {};
    inputs.forEach(input => { payload[input.getAttribute('data-key')] = input.value; });

    try {
        const res = await fetch('/api/settings.php', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        
        const json = await res.json();
        
        alertBox.classList.remove('d-none', 'alert-danger', 'alert-success');
        if(json.status === 'success') {
            alertBox.classList.add('alert-success');
            alertBox.innerHTML = '<i class="bi bi-check-circle-fill me-2"></i> Settings saved securely!';
        } else {
            alertBox.classList.add('alert-danger');
            alertBox.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-2"></i> ${json.message || 'Error saving settings.'}`;
        }
    } catch (e) {
        alertBox.classList.remove('d-none', 'alert-success');
        alertBox.classList.add('alert-danger');
        alertBox.innerText = 'Network request failed.';
    }
    
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-save me-1"></i> Save Configuration';
});

document.getElementById('testEmailBtn').addEventListener('click', async () => {
    const btn = document.getElementById('testEmailBtn');
    const alertBox = document.getElementById('alertBox');
    
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm py-1 me-1"></span> Sending...';
    
    try {
        const res = await fetch('/api/test_email.php', { method: 'POST' });
        const json = await res.json();
        
        alertBox.classList.remove('d-none', 'alert-danger', 'alert-success');
        if (json.status === 'success') {
            alertBox.classList.add('alert-success');
            alertBox.innerHTML = `<i class="bi bi-check-circle-fill me-2"></i> ${json.message}`;
        } else {
            alertBox.classList.add('alert-danger');
            alertBox.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-2"></i> ${json.message || 'SMTP Test Failed.'}`;
        }
    } catch (e) {
        alertBox.classList.remove('d-none', 'alert-success');
        alertBox.classList.add('alert-danger');
        alertBox.innerHTML = '<i class="bi bi-exclamation-triangle-fill me-2"></i> Server error during test email.';
    }
    
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-send me-1"></i> Send Test Email';
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout.php', { method: 'POST' });
    window.location.href = 'login.html';
});

loadSettings();
</script>

</body>
</html>
