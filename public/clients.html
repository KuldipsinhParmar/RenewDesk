<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Clients - RenewDesk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="assets/css/v2.css">
</head>
<body class="rd-body">
<div class="rd-layout">

    <!-- SIDEBAR -->
    <aside class="rd-sidebar">
        <div class="rd-sidebar-logo">
            <div class="rd-logo-icon"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg></div>
            <span class="rd-logo-text">RenewDesk</span>
        </div>
        <div class="rd-nav-label">Workspace</div>
        <nav class="rd-nav">
            <a href="dashboard.html" class="rd-nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></svg>Dashboard</a>
            <a href="clients.html" class="rd-nav-item active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Clients</a>
            <a href="projects.html" class="rd-nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Projects</a>
        </nav>
        <div class="rd-nav-label">Assets</div>
        <nav class="rd-nav">
            <a href="domains.html" class="rd-nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.6 2.6 2.6 15.4 0 18M12 3c-2.6 2.6-2.6 15.4 0 18"/></svg>Domains</a>
            <a href="hosting.html" class="rd-nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="7" rx="1.8"/><rect x="3" y="13" width="18" height="7" rx="1.8"/><path d="M7 7.5h.01M7 16.5h.01"/></svg>Hosting</a>
            <a href="maintenance.html" class="rd-nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a3.7 3.7 0 0 0-5 4.9L4 17v3h3l5.8-5.7a3.7 3.7 0 0 0 4.9-5l-2.5 2.5-2.2-2.2z"/></svg>Maintenance</a>
            <a href="backups.html" class="rd-nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 18a4 4 0 0 1-.5-7.97 6 6 0 0 1 11.6 1.4A3.5 3.5 0 0 1 17 18z"/></svg>Backups</a>
            <a href="tasks.html" class="rd-nav-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.5 12.3l2.4 2.4 4.6-5"/></svg>Tasks</a>
        </nav>
        <div class="rd-sidebar-footer">
            <div class="rd-user-row">
                <div class="rd-user-avatar">AD</div>
                <div class="rd-user-info"><div class="rd-user-name">Admin</div><div class="rd-user-role">IT Manager</div></div>
                <button id="logoutBtn" class="rd-logout-btn" title="Sign out"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h3"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg></button>
            </div>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="rd-main">
        <div class="rd-page-header">
            <div>
                <h1 class="rd-page-title">Clients</h1>
                <p class="rd-page-subtitle" id="clientCount">Loading clients…</p>
            </div>
            <button onclick="showModal()" class="rd-btn rd-btn-primary">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                Add Client
            </button>
        </div>

        <!-- Toolbar -->
        <div class="rd-toolbar">
            <div class="rd-search-wrap">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
                <input id="searchClients" class="rd-search-input" placeholder="Search by name, company, or email…" type="text"/>
            </div>
        </div>

        <!-- Table -->
        <div class="rd-card">
            <table style="width:100%;border-collapse:collapse">
                <thead><tr>
                    <th style="padding:13px 20px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Client</th>
                    <th style="padding:13px 16px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Email</th>
                    <th style="padding:13px 16px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Phone</th>
                    <th style="padding:13px 16px;text-align:center;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Projects</th>
                    <th style="padding:13px 20px;text-align:right;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-3);border-bottom:1px solid var(--border)">Actions</th>
                </tr></thead>
                <tbody id="clientTable">
                    <tr><td colspan="5" style="text-align:center;padding:32px;color:var(--text-3)">Loading clients…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="clientModal" style="display:none;position:fixed;inset:0;z-index:50;background:rgba(21,24,26,.45);backdrop-filter:blur(4px);align-items:center;justify-content:center">
    <div class="rd-modal">
        <div class="rd-modal-header">
            <span class="rd-modal-title" id="modalTitle">Add Client</span>
            <button onclick="hideModal()" class="rd-modal-close">×</button>
        </div>
        <div class="rd-modal-body">
            <form id="clientForm" autocomplete="off">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
                    <div class="rd-form-group">
                        <label class="rd-label">Name <span style="color:var(--bad)">*</span></label>
                        <input type="text" id="c_name" class="rd-input" placeholder="e.g. John Smith" required>
                    </div>
                    <div class="rd-form-group">
                        <label class="rd-label">Company</label>
                        <input type="text" id="c_company" class="rd-input" placeholder="e.g. Acme Corp">
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px">
                    <div class="rd-form-group">
                        <label class="rd-label">Email</label>
                        <input type="email" id="c_email" class="rd-input" placeholder="john@example.com">
                    </div>
                    <div class="rd-form-group">
                        <label class="rd-label">Phone</label>
                        <input type="text" id="c_phone" class="rd-input" placeholder="+91 99999 99999">
                    </div>
                </div>
                <div class="rd-form-group" style="margin-top:14px">
                    <label class="rd-label">Notes</label>
                    <textarea id="c_notes" class="rd-textarea" placeholder="Any additional info about this client…" rows="3"></textarea>
                </div>
            </form>
        </div>
        <div class="rd-modal-footer">
            <button onclick="hideModal()" style="padding:10px 18px;border-radius:10px;border:1px solid var(--border-2);background:var(--surface);color:var(--text);font-size:14px;font-weight:600;cursor:pointer">Cancel</button>
            <button onclick="saveClient()" id="saveClientBtn" class="rd-btn rd-btn-primary" style="border-radius:10px;padding:10px 20px">Add Client</button>
        </div>
    </div>
</div>

<script src="assets/js/rd-api.js"></script>
<script>
let clientsData = [];
let editId = null;

async function loadClients() {
    try {
        const res = await fetch(rdApi('api/clients.php'), { credentials: 'same-origin' });
        if (res.status === 401) { window.location.href = 'login.html'; return; }
        const data = await res.json();
        clientsData = data.data;
        document.getElementById('clientCount').textContent = clientsData.length + ' client' + (clientsData.length !== 1 ? 's' : '') + ' in your portfolio';
        renderClients(clientsData);
    } catch(e) { console.error("Failed to load clients", e); }
}

function initials(name) {
    return name.trim().split(/\s+/).slice(0,2).map(w => w[0].toUpperCase()).join('');
}

function renderClients(list) {
    const tbody = document.getElementById('clientTable');
    if (!list.length) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-3)">No clients found. Add your first client!</td></tr>';
        return;
    }
    tbody.innerHTML = list.map(c => `
        <tr style="transition:background .1s" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background=''">
            <td style="padding:14px 20px;border-bottom:1px solid var(--border)">
                <div style="display:flex;align-items:center;gap:13px">
                    <span style="width:38px;height:38px;border-radius:10px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-weight:700;font-size:13px;font-family:'Space Grotesk',sans-serif;flex:none">${initials(c.name)}</span>
                    <div>
                        <div style="font-weight:600;font-size:14.5px;color:var(--text)">${c.name}</div>
                        ${c.company ? `<div style="font-size:12.5px;color:var(--text-3);margin-top:1px">${c.company}</div>` : ''}
                    </div>
                </div>
            </td>
            <td style="padding:14px 16px;border-bottom:1px solid var(--border);font-size:13.5px;color:var(--text-2)">${c.email || '—'}</td>
            <td style="padding:14px 16px;border-bottom:1px solid var(--border);font-size:13.5px;color:var(--text-2);font-family:'IBM Plex Mono',monospace">${c.phone || '—'}</td>
            <td style="padding:14px 16px;border-bottom:1px solid var(--border);text-align:center">
                <a href="projects.html?client_id=${c.id}" style="display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;background:var(--accent-soft);color:var(--accent);font-size:12.5px;font-weight:700;text-decoration:none">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                    ${c.project_count}
                </a>
            </td>
            <td style="padding:14px 20px;border-bottom:1px solid var(--border)">
                <div style="display:flex;gap:7px;justify-content:flex-end">
                    <button onclick='editClient(${JSON.stringify(c).replace(/'/g,"&#39;")})' class="rd-icon-btn" title="Edit">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 3.5l4 4L7 21l-4 1 1-4z"/></svg>
                    </button>
                    <button onclick="deleteClient(${c.id}, '${c.name.replace(/'/g,"\\'")}', ${c.project_count})" class="rd-icon-btn danger" title="Delete">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M6 7l1 13a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1l1-13"/></svg>
                    </button>
                </div>
            </td>
        </tr>`).join('');
}

document.getElementById('searchClients').addEventListener('input', e => {
    const term = e.target.value.toLowerCase();
    renderClients(clientsData.filter(c =>
        c.name.toLowerCase().includes(term) ||
        (c.company || '').toLowerCase().includes(term) ||
        (c.email || '').toLowerCase().includes(term)
    ));
});

function showModal() {
    document.getElementById('clientForm').reset();
    document.getElementById('modalTitle').textContent = 'Add Client';
    document.getElementById('saveClientBtn').textContent = 'Add Client';
    editId = null;
    document.getElementById('clientModal').style.display = 'flex';
}

function editClient(c) {
    document.getElementById('clientForm').reset();
    document.getElementById('modalTitle').textContent = 'Edit Client';
    document.getElementById('saveClientBtn').textContent = 'Save Changes';
    editId = c.id;
    document.getElementById('c_name').value = c.name || '';
    document.getElementById('c_company').value = c.company || '';
    document.getElementById('c_email').value = c.email || '';
    document.getElementById('c_phone').value = c.phone || '';
    document.getElementById('c_notes').value = c.notes || '';
    document.getElementById('clientModal').style.display = 'flex';
}

function hideModal() {
    document.getElementById('clientModal').style.display = 'none';
}

async function saveClient() {
    const name = document.getElementById('c_name').value.trim();
    if (!name) { Swal.fire({ icon:'warning', title:'Name required', text:'Please enter the client name.', confirmButtonColor:'var(--accent)' }); return; }
    const payload = {
        name,
        company: document.getElementById('c_company').value.trim(),
        email: document.getElementById('c_email').value.trim(),
        phone: document.getElementById('c_phone').value.trim(),
        notes: document.getElementById('c_notes').value.trim()
    };
    const btn = document.getElementById('saveClientBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
        const url = editId ? rdApi(`api/clients.php?id=${editId}`) : rdApi('api/clients.php');
        const method = editId ? 'PUT' : 'POST';
        const res = await fetch(url, { method, headers:{'Content-Type':'application/json'}, credentials:'same-origin', body:JSON.stringify(payload) });
        const json = await res.json();
        if (json.status === 'success') {
            hideModal();
            loadClients();
        } else {
            Swal.fire({ icon:'error', title:'Error', text: json.message || 'Failed to save client.', confirmButtonColor:'var(--accent)' });
        }
    } catch(e) {
        Swal.fire({ icon:'error', title:'Network error', text:'Could not reach server.', confirmButtonColor:'var(--accent)' });
    }
    btn.disabled = false;
}

async function deleteClient(id, name, projectCount) {
    const warn = projectCount > 0 ? `<br><small style="color:var(--bad)">This client has ${projectCount} project(s). They will become unassigned.</small>` : '';
    const result = await Swal.fire({
        title: 'Delete client?',
        html: `<b>${name}</b> will be permanently removed.${warn}`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: 'var(--bad)',
        cancelButtonColor: 'var(--surface-2)',
        confirmButtonText: 'Yes, delete',
        cancelButtonText: 'Cancel'
    });
    if (!result.isConfirmed) return;
    try {
        const res = await fetch(rdApi(`api/clients.php?id=${id}`), { method:'DELETE', credentials:'same-origin' });
        const json = await res.json();
        if (json.status === 'success') loadClients();
        else Swal.fire({ icon:'error', title:'Error', text: json.message || 'Delete failed.', confirmButtonColor:'var(--accent)' });
    } catch(e) {
        Swal.fire({ icon:'error', title:'Network error', text:'Could not reach server.', confirmButtonColor:'var(--accent)' });
    }
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch(rdApi('api/auth/logout.php'), { method:'POST', credentials:'same-origin' });
    window.location.href = 'login.html';
});

loadClients();
</script>
</body>
</html>
