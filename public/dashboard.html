<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - RenewDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f4f6f9; color: #2d3436; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #b2bec3; border-radius: 4px; }
        
        .navbar-custom {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .navbar-brand { font-weight: 700; color: #2d3436; font-size: 1.4rem; letter-spacing: -0.5px; }
        .nav-link { color: #636e72 !important; font-weight: 500; transition: color 0.3s ease, transform 0.2s ease; padding: 0.5rem 1rem;}
        .nav-link:hover { color: #0984e3 !important; transform: translateY(-1px); }
        .nav-link.active { color: #0984e3 !important; font-weight: 600; }
        .nav-icon { background: linear-gradient(135deg, #0984e3, #6c5ce7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block;}
        
        .page-content { padding: 40px 0; min-height: calc(100vh - 76px); }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        .delay-1 { animation-delay: 0.1s; } .delay-2 { animation-delay: 0.2s; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        
        .glass-card { background: #fff; border-radius: 16px; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); transition: all 0.3s ease; padding: 25px; }
        .stat-card:hover { transform: translateY(-7px); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08); }
        
        .stat-icon { width: 64px; height: 64px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin-bottom: 15px;}
        .bg-gradient-primary { background: linear-gradient(135deg, rgba(9,132,227,0.15), rgba(9,132,227,0.05)); color: #0984e3; }
        .bg-gradient-success { background: linear-gradient(135deg, rgba(0,184,148,0.15), rgba(0,184,148,0.05)); color: #00b894; }
        .bg-gradient-warning { background: linear-gradient(135deg, rgba(253,203,110,0.2), rgba(253,203,110,0.05)); color: #e17055; }
        
        .stat-value { font-size: 2.2rem; font-weight: 700; color: #2d3436; margin-bottom: 0; line-height: 1; }
        .stat-label { color: #636e72; font-weight: 500; font-size: 0.95rem; margin-top: 8px;}
        
        .table-custom { border-collapse: separate; border-spacing: 0 10px; width: 100%; }
        .table-custom thead th { border: none; text-transform: uppercase; font-size: 11px; color: #b2bec3; letter-spacing: 1px; padding: 10px 20px; font-weight: 600; }
        .table-custom tbody tr { background: #fff; box-shadow: 0 3px 10px rgba(0,0,0,0.02); border-radius: 12px; transition: transform 0.2s; }
        .table-custom tbody tr:hover { transform: scale(1.01) translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .table-custom td { border: none; padding: 18px 20px; vertical-align: middle; color: #2d3436; font-weight: 500;}
        .table-custom tbody tr td:first-child { border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        .table-custom tbody tr td:last-child { border-top-right-radius: 12px; border-bottom-right-radius: 12px; }
        
        .badge { padding: 8px 12px; border-radius: 8px; font-weight: 600; font-size: 12px;}
        .btn-gradient { background: linear-gradient(135deg, #0984e3, #6c5ce7); border: none; color: white; padding: 8px 20px; border-radius: 8px; font-weight: 500; transition: all 0.3s; }
        .btn-gradient:hover { box-shadow: 0 8px 15px rgba(108, 92, 231, 0.3); color: white; transform: translateY(-2px); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom sticky-top py-3">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
        <i class="bi bi-shield-lock-fill nav-icon fs-3 me-2"></i> RenewDesk
    </a>
    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navContent">
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-3">
        <li class="nav-item"><a class="nav-link active" href="dashboard.html"><i class="bi bi-speedometer2 me-1"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="projects.html"><i class="bi bi-folder-fill me-1"></i> Projects</a></li>
        <li class="nav-item"><a class="nav-link" href="logs.html"><i class="bi bi-clock-history me-1"></i> Logs</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
        <a href="settings.html" class="nav-link p-0"><i class="bi bi-gear-fill fs-5"></i></a>
        <button class="btn btn-gradient btn-sm" id="logoutBtn"><i class="bi bi-box-arrow-right me-1"></i> Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="page-content">
    <div class="container">
        
        <div class="d-flex justify-content-between align-items-center mb-5 fade-in">
            <div>
                <h2 class="fw-bold mb-1">Dashboard</h2>
                <p class="text-muted mb-0">Overview of your infrastructure renewals.</p>
            </div>
        </div>
        
        <div class="row g-4 mb-5 fade-in delay-1">
            <div class="col-md-4">
                <div class="glass-card stat-card">
                    <div class="stat-icon bg-gradient-primary"><i class="bi bi-folder2-open"></i></div>
                    <h3 class="stat-value" id="stat-projects">0</h3>
                    <p class="stat-label">Active Projects</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card stat-card">
                    <div class="stat-icon bg-gradient-success"><i class="bi bi-globe"></i></div>
                    <h3 class="stat-value" id="stat-domains">0</h3>
                    <p class="stat-label">Active Domains</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card stat-card">
                    <div class="stat-icon bg-gradient-warning"><i class="bi bi-currency-dollar"></i></div>
                    <h3 class="stat-value"><span id="stat-amc">0</span></h3>
                    <p class="stat-label">Total AMC Revenue</p>
                </div>
            </div>
        </div>

        <div class="fade-in delay-2">
            <div class="d-flex align-items-center mb-3">
                <i class="bi bi-hourglass-split text-danger fs-4 me-2"></i>
                <h4 class="fw-bold mb-0">Upcoming Renewals <span class="text-muted fw-normal fs-6 ms-2">(Next 30 Days)</span></h4>
            </div>
            
            <div class="table-responsive">
                <table class="table-custom">
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Project</th>
                            <th>Item Details</th>
                            <th>Expiry Date</th>
                            <th class="text-end">Status</th>
                        </tr>
                    </thead>
                    <tbody id="upcomingTable">
                        <tr><td colspan="5" class="text-center text-muted bg-white rounded-3 py-4 border">Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function checkAuth() {
    const res = await fetch('/api/dashboard.php');
    if (res.status === 401) window.location.href = 'login.html';
    return await res.json();
}

async function loadDashboard() {
    try {
        const data = await checkAuth();
        if (data.status === 'success') {
            const d = data.data;
            document.getElementById('stat-projects').innerText = d.total_projects;
            document.getElementById('stat-domains').innerText = d.total_domains;
            
            // Format currency
            let val = parseFloat(d.amc_revenue) || 0;
            document.getElementById('stat-amc').innerText = new Intl.NumberFormat('en-IN').format(val);

            const tbody = document.getElementById('upcomingTable');
            tbody.innerHTML = '';
            
            if (d.upcoming.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted bg-white rounded-3 py-4 border-0 shadow-sm align-middle"><i class="bi bi-check-circle text-success fs-1 d-block mb-2"></i>You are all caught up! No renewals in 30 days.</td></tr>';
                return;
            }

            d.upcoming.forEach(item => {
                let badgeClass = item.days_left <= 7 ? 'bg-danger bg-opacity-10 text-danger border border-danger border-opacity-25' : 
                                 (item.days_left <= 15 ? 'bg-warning bg-opacity-10 text-warning border border-warning border-opacity-25' : 
                                 'bg-success bg-opacity-10 text-success border border-success border-opacity-25');
                
                let iconClass = item.type === 'Domain' ? 'bi-globe text-primary' : 
                                (item.type === 'Hosting' ? 'bi-server text-purple' : 'bi-tools text-warning');

                tbody.innerHTML += `
                    <tr>
                        <td><div class="d-flex align-items-center"><div class="rounded-circle shadow-sm bg-light d-flex align-items-center justify-content-center me-3" style="width: 40px; height: 40px;"><i class="bi ${iconClass}"></i></div> <strong>${item.type}</strong></div></td>
                        <td>${item.project}</td>
                        <td>${item.name}</td>
                        <td>${item.date}</td>
                        <td class="text-end"><span class="badge ${badgeClass}">${item.days_left} Days Left</span></td>
                    </tr>
                `;
            });
        }
    } catch(e) {
        console.error("Dashboard failed to load", e);
    }
}

document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout.php', { method: 'POST' });
    window.location.href = 'login.html';
});

loadDashboard();
</script>

</body>
</html>
