<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Logs - RenewDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f4f6f9; color: #2d3436; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #b2bec3; border-radius: 4px; }
        
        .navbar-custom {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        .navbar-brand { font-weight: 700; color: #2d3436; font-size: 1.4rem; letter-spacing: -0.5px; }
        .nav-link { color: #636e72 !important; font-weight: 500; transition: color 0.3s ease, transform 0.2s ease; padding: 0.5rem 1rem;}
        .nav-link:hover { color: #0984e3 !important; transform: translateY(-1px); }
        .nav-link.active { color: #0984e3 !important; font-weight: 600; }
        .nav-icon { background: linear-gradient(135deg, #0984e3, #6c5ce7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block;}
        
        .page-content { padding: 40px 0; min-height: calc(100vh - 76px); }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        
        .glass-card { background: #fff; border-radius: 16px; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); transition: all 0.3s ease; padding: 25px; }
        
        .table-custom { border-collapse: separate; border-spacing: 0 10px; width: 100%; }
        .table-custom thead th { border: none; text-transform: uppercase; font-size: 11px; color: #b2bec3; letter-spacing: 1px; padding: 10px 20px; font-weight: 600; }
        .table-custom tbody tr { background: #f8f9fa; border-radius: 12px; transition: transform 0.2s, background 0.3s; }
        .table-custom tbody tr:hover { transform: scale(1.01) translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.05); background: #fff; }
        .table-custom td { border: none; padding: 18px 20px; vertical-align: middle; color: #2d3436; font-weight: 500;}
        .table-custom tbody tr td:first-child { border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        .table-custom tbody tr td:last-child { border-top-right-radius: 12px; border-bottom-right-radius: 12px; }
        
        .badge { padding: 8px 12px; border-radius: 8px; font-weight: 600; font-size: 11px; letter-spacing: 0.5px;}
        .bg-success-soft { background: rgba(0,184,148,0.1); color: #00b894; border: 1px solid rgba(0,184,148,0.2); }
        .bg-danger-soft { background: rgba(225,112,85,0.1); color: #e17055; border: 1px solid rgba(225,112,85,0.2);}
        
        .btn-gradient { background: linear-gradient(135deg, #0984e3, #6c5ce7); border: none; color: white; padding: 8px 20px; border-radius: 8px; font-weight: 500; transition: all 0.3s; }
        .btn-gradient:hover { box-shadow: 0 8px 15px rgba(108, 92, 231, 0.3); color: white; transform: translateY(-2px); }
        
        .search-box { background: #f8f9fa; border-radius: 50px; padding: 8px 20px; border: 1px solid #dfe6e9; display: flex; align-items: center; width: 350px;}
        .search-box input { border: none; box-shadow: none; outline: none; background: transparent; width: 100%; padding-left: 10px; font-weight: 500;}
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom sticky-top py-3">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
        <i class="bi bi-shield-lock-fill nav-icon fs-3 me-2"></i> RenewDesk
    </a>
    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navContent">
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-3">
        <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-1"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="projects.html"><i class="bi bi-folder-fill me-1"></i> Projects</a></li>
        <li class="nav-item"><a class="nav-link active" href="logs.html"><i class="bi bi-clock-history me-1"></i> Logs</a></li>
      </ul>
      <div class="d-flex align-items-center gap-3 mt-3 mt-lg-0">
        <a href="settings.html" class="nav-link p-0"><i class="bi bi-gear-fill fs-5"></i></a>
        <button class="btn btn-gradient btn-sm" id="logoutBtn"><i class="bi bi-box-arrow-right me-1"></i> Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="page-content">
    <div class="container fade-in">
        
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-5 gap-3">
            <div>
                <h2 class="fw-bold mb-1">Email Logs</h2>
                <p class="text-muted mb-0">Audit history of automated cron alerts.</p>
            </div>
            
            <div class="search-box">
                <i class="bi bi-search text-muted"></i>
                <input type="text" id="searchLogs" placeholder="Filter by project, subject, or type...">
            </div>
        </div>

        <div class="glass-card table-responsive bg-transparent shadow-none px-0">
            <table class="table-custom">
                <thead>
                    <tr>
                        <th width="180">Date & Time</th>
                        <th>Project Entity</th>
                        <th>Alert Type</th>
                        <th>Subject Line</th>
                        <th class="text-end">Delivery</th>
                    </tr>
                </thead>
                <tbody id="logsTable">
                    <tr><td colspan="5" class="text-center text-muted bg-white border-0 py-5 rounded-3 shadow-sm">Loading logs...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let logsData = [];

async function loadLogs() {
    try {
        const res = await fetch('/api/logs.php');
        if (res.status === 401) window.location.href = 'login.html';
        const json = await res.json();
        logsData = json.data;
        renderTable(logsData);
    } catch(e) {
        console.error("Failed to load generic logs");
    }
}

function renderTable(data) {
    const tbody = document.getElementById('logsTable');
    tbody.innerHTML = '';
    
    if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted bg-white border-0 py-5 shadow-sm rounded-3"><i class="bi bi-mailbox-flag fs-1 d-block mb-3 text-secondary"></i>No emails have been sent by the system yet.</td></tr>';
        return;
    }

    data.forEach(log => {
        const d = new Date(log.sent_at).toLocaleString('en-GB', {day: '2-digit', month: 'short', hour: '2-digit', minute:'2-digit'});
        const bClass = log.success == 1 ? 'bg-success-soft' : 'bg-danger-soft';
        const txt = log.success == 1 ? 'Delivered successfully' : 'SMTP Error';
        
        let iconClass = log.type === 'domain' ? 'bi-globe text-primary' : 
                        (log.type === 'hosting' ? 'bi-server text-purple' : 
                        (log.type === 'maintenance' ? 'bi-tools text-warning' : 'bi-cloud-arrow-up text-success'));

        const projName = log.project_name || '<em class="text-muted opacity-50">Deleted Project</em>';

        tbody.innerHTML += `
            <tr>
                <td class="text-muted small">${d}</td>
                <td><strong>${projName}</strong></td>
                <td><div class="d-flex align-items-center"><div class="bg-white rounded shadow-sm d-flex align-items-center justify-content-center me-2 border" style="width:30px;height:30px;"><i class="bi ${iconClass}"></i></div> ${log.type.charAt(0).toUpperCase() + log.type.slice(1)}</div></td>
                <td class="text-truncate text-muted" style="max-width: 300px;">${log.subject}</td>
                <td class="text-end"><span class="badge ${bClass}"><i class="bi bi-circle-fill me-1" style="font-size: 8px;"></i> ${txt}</span></td>
            </tr>
        `;
    });
}

document.getElementById('searchLogs').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = logsData.filter(log => 
        (log.project_name || '').toLowerCase().includes(term) || 
        log.subject.toLowerCase().includes(term) ||
        log.type.toLowerCase().includes(term)
    );
    renderTable(filtered);
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/auth/logout.php', { method: 'POST' });
    window.location.href = 'login.html';
});

loadLogs();
</script>

</body>
</html>
