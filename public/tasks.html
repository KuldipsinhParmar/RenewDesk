<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Task Tracker - RenewDesk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="assets/js/sidebar.js"></script>
    <link rel="stylesheet" href="assets/css/v2.css">
    <style>
        .task-row .task-actions { opacity: 0.25; transition: opacity 0.15s; }
        .task-row:hover .task-actions { opacity: 1; }
        @keyframes slideIn { from { opacity:0;transform:translateY(6px) } to { opacity:1;transform:none } }
        .animate-slide-in { animation: slideIn 0.25s ease-out forwards; }
        .date-group-header { background:var(--accent-soft);border-left:3px solid var(--accent); }
    </style>
</head>
<body class="rd-body">
<div class="rd-layout">

    <!-- SIDEBAR -->
    <aside class="rd-sidebar" id="rd-sidebar"></aside>
    <script>rdSidebar.init('tasks');</script>

    <!-- MAIN -->
    <div class="rd-main">
        <div class="rd-page-header">
            <button class="rd-menu-btn" onclick="rdSidebar.open()" aria-label="Menu"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
            <div><h1 class="rd-page-title">Task Tracker</h1><p class="rd-page-subtitle">Date-wise work log across all projects</p></div>
        </div>

        <!-- Stats Row -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px">
            <div class="rd-card" style="padding:20px;display:flex;align-items:center;gap:16px">
                <div style="width:44px;height:44px;border-radius:12px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M9 9h6M9 13h4"/></svg></div>
                <div><div id="statTotalTasks" style="font-size:24px;font-weight:700;font-family:'IBM Plex Mono',monospace">0</div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:600">Total Tasks</div></div>
            </div>
            <div class="rd-card" style="padding:20px;display:flex;align-items:center;gap:16px">
                <div style="width:44px;height:44px;border-radius:12px;background:rgba(91,105,230,.13);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--c-blue)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg></div>
                <div><div id="statTotalHours" style="font-size:24px;font-weight:700;font-family:'IBM Plex Mono',monospace">0</div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:600">Total Hours</div></div>
            </div>
            <div class="rd-card" style="padding:20px;display:flex;align-items:center;gap:16px">
                <div style="width:44px;height:44px;border-radius:12px;background:var(--good-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--good)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
                <div><div id="statTodayHours" style="font-size:24px;font-weight:700;font-family:'IBM Plex Mono',monospace">0</div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:600">Today's Hours</div></div>
            </div>
            <div class="rd-card" style="padding:20px;display:flex;align-items:center;gap:16px">
                <div style="width:44px;height:44px;border-radius:12px;background:rgba(224,144,42,.13);display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--c-amber)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>
                <div><div id="statProjects" style="font-size:24px;font-weight:700;font-family:'IBM Plex Mono',monospace">0</div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:600">Active Projects</div></div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="rd-toolbar">
            <div class="rd-search-wrap">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
                <input id="searchTasks" class="rd-search-input" placeholder="Search tasks…" type="text"/>
            </div>
            <select id="filterProject" class="rd-filter-select"><option value="">All Projects</option></select>
            <input type="date" id="filterDate" class="rd-filter-select" style="cursor:pointer">
            <button onclick="showAddTaskModal()" class="rd-btn rd-btn-primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>Add Task</button>
        </div>

        <!-- Tasks grouped by date -->
        <div id="tasksContainer" style="display:flex;flex-direction:column;gap:20px">
            <div style="text-align:center;padding:60px;color:var(--text-3)">Loading tasks…</div>
        </div>
    </div>
</div>

<!-- Task Modal -->
<div id="taskModal" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(20,22,18,.35);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center">
    <div class="rd-modal" style="width:100%;max-width:500px">
        <div class="rd-modal-header">
            <h3 class="rd-modal-title" id="taskModalTitle">Add New Task</h3>
            <button onclick="hideTaskModal()" class="rd-icon-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
        </div>
        <div class="rd-modal-body">
            <form id="taskForm">
                <div class="rd-form-group">
                    <label class="rd-label">Project <span style="color:var(--bad)">*</span></label>
                    <select id="t_project_id" class="rd-input" required><option value="">Select Project</option></select>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
                    <div class="rd-form-group">
                        <label class="rd-label">Date <span style="color:var(--bad)">*</span></label>
                        <input type="date" id="t_task_date" class="rd-input" required>
                    </div>
                    <div class="rd-form-group">
                        <label class="rd-label">Hours Worked <span style="color:var(--bad)">*</span></label>
                        <input type="number" step="0.5" min="0" max="24" id="t_hours" class="rd-input" placeholder="e.g. 2.5" required>
                    </div>
                </div>
                <div class="rd-form-group">
                    <label class="rd-label">Task Title <span style="color:var(--bad)">*</span></label>
                    <input type="text" id="t_task_title" class="rd-input" placeholder="e.g. Homepage redesign, API integration…" required>
                </div>
                <div class="rd-form-group">
                    <label class="rd-label">Notes <span style="color:var(--text-3)">(optional)</span></label>
                    <textarea id="t_notes" rows="3" class="rd-input" placeholder="Any additional details…" style="resize:vertical"></textarea>
                </div>
            </form>
        </div>
        <div class="rd-modal-footer">
            <button onclick="hideTaskModal()" class="rd-btn">Cancel</button>
            <button onclick="saveTask()" id="saveTaskBtn" class="rd-btn rd-btn-primary">Add Task</button>
        </div>
    </div>
</div>

<script src="assets/js/rd-api.js"></script>
<script>
let allTasks = [];
let allProjects = [];
let currentEditTaskId = null;

async function loadProjects() {
    try {
        const res = await fetch(rdApi('api/projects.php'), { credentials: 'same-origin' });
        if (res.status === 401) { window.location.href = 'login.html'; return; }
        const data = await res.json();
        allProjects = data.data;
        const filterSelect = document.getElementById('filterProject');
        const formSelect = document.getElementById('t_project_id');
        allProjects.forEach(p => {
            filterSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`;
            formSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`;
        });
    } catch(e) { console.error("Failed to load projects", e); }
}

async function loadTasks() {
    try {
        const res = await fetch(rdApi('api/tasks.php'), { credentials: 'same-origin' });
        if (res.status === 401) { window.location.href = 'login.html'; return; }
        const data = await res.json();
        allTasks = data.data;
        applyFiltersAndRender();
    } catch(e) { rdError('Failed to load tasks.'); }
}

function applyFiltersAndRender() {
    let filtered = [...allTasks];
    const search = document.getElementById('searchTasks').value.toLowerCase();
    const projFilter = document.getElementById('filterProject').value;
    const dateFilter = document.getElementById('filterDate').value;
    if (search) filtered = filtered.filter(t => t.task_title.toLowerCase().includes(search) || (t.project_name && t.project_name.toLowerCase().includes(search)) || (t.notes && t.notes.toLowerCase().includes(search)));
    if (projFilter) filtered = filtered.filter(t => t.project_id == projFilter);
    if (dateFilter) filtered = filtered.filter(t => t.task_date === dateFilter);
    renderTasks(filtered);
    updateStats(filtered);
}

function updateStats(tasks) {
    document.getElementById('statTotalTasks').textContent = tasks.length;
    const totalHours = tasks.reduce((sum, t) => sum + parseFloat(t.hours || 0), 0);
    document.getElementById('statTotalHours').textContent = totalHours.toFixed(1);
    const today = new Date().toISOString().split('T')[0];
    const todayHours = tasks.filter(t => t.task_date === today).reduce((sum, t) => sum + parseFloat(t.hours || 0), 0);
    document.getElementById('statTodayHours').textContent = todayHours.toFixed(1);
    document.getElementById('statProjects').textContent = new Set(tasks.map(t => t.project_id)).size;
}

function formatDate(d) {
    if (!d) return '—';
    let dt = new Date(d + 'T00:00:00');
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${days[dt.getDay()]}, ${dt.getDate()} ${months[dt.getMonth()]} ${dt.getFullYear()}`;
}

function isToday(d) { return d === new Date().toISOString().split('T')[0]; }

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function renderTasks(tasks) {
    const container = document.getElementById('tasksContainer');
    if (!tasks || tasks.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:60px;color:var(--text-3)">No tasks found. Click <strong>Add Task</strong> to log your first work entry.</div>`;
        return;
    }
    const grouped = {};
    tasks.forEach(t => { if (!grouped[t.task_date]) grouped[t.task_date] = []; grouped[t.task_date].push(t); });
    const sortedDates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));
    let html = '';
    sortedDates.forEach((date, idx) => {
        const dateTasks = grouped[date];
        const dayTotal = dateTasks.reduce((sum, t) => sum + parseFloat(t.hours || 0), 0);
        const todayExtra = isToday(date) ? 'border-left-color:var(--good)' : '';
        html += `
        <div class="animate-slide-in" style="animation-delay:${idx*40}ms">
            <div class="date-group-header" style="border-radius:10px;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;${todayExtra}">
                <div style="display:flex;align-items:center;gap:10px">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                    <span style="font-size:13.5px;font-weight:700;color:var(--text)">${formatDate(date)}</span>
                    ${isToday(date) ? '<span style="font-size:10px;font-weight:700;color:var(--good);text-transform:uppercase;letter-spacing:.06em">Today</span>' : ''}
                </div>
                <div style="display:flex;align-items:center;gap:10px">
                    <span style="font-size:11px;color:var(--text-3);font-weight:600">${dateTasks.length} task${dateTasks.length>1?'s':''}</span>
                    <span style="background:var(--accent);color:var(--on-accent);font-size:11.5px;font-weight:700;padding:3px 12px;border-radius:999px">${dayTotal.toFixed(1)} hrs</span>
                </div>
            </div>
            <div class="rd-card" style="overflow:hidden;padding:0">`;
        dateTasks.forEach((t, tIdx) => {
            const border = tIdx < dateTasks.length-1 ? 'border-bottom:1px solid var(--border)' : '';
            html += `
                <div class="task-row" style="display:flex;align-items:center;gap:14px;padding:14px 18px;transition:background .1s;${border}" onmouseover="this.style.background='var(--surface-2)'" onmouseout="this.style.background=''">
                    <div style="width:38px;height:38px;border-radius:10px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0">
                        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.5 12.3l2.4 2.4 4.6-5"/></svg>
                    </div>
                    <div style="flex:1;min-width:0">
                        <div style="font-weight:600;font-size:14px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(t.task_title)}</div>
                        <div style="display:flex;align-items:center;gap:10px;font-size:11.5px">
                            <span style="color:var(--accent);font-weight:600">${escapeHtml(t.project_name || 'Unknown')}</span>
                            ${t.notes ? `<span style="color:var(--text-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px">• ${escapeHtml(t.notes)}</span>` : ''}
                        </div>
                    </div>
                    <div style="display:flex;align-items:center;gap:12px;flex-shrink:0">
                        <div style="text-align:right;margin-right:4px">
                            <div style="font-size:20px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:var(--text)">${parseFloat(t.hours).toFixed(1)}</div>
                            <div style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);font-weight:600">hours</div>
                        </div>
                        <div class="task-actions" style="display:flex;gap:6px">
                            <button onclick='editTask(${JSON.stringify(t).replace(/'/g,"&#39;")})' class="rd-icon-btn" title="Edit"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
                            <button onclick="deleteTask(${t.id})" class="rd-icon-btn danger" title="Delete"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>
                        </div>
                    </div>
                </div>`;
        });
        html += `</div></div>`;
    });
    container.innerHTML = html;
}

function showAddTaskModal() {
    document.getElementById('taskForm').reset();
    document.getElementById('taskModalTitle').innerText = 'Add New Task';
    document.getElementById('saveTaskBtn').innerText = 'Add Task';
    currentEditTaskId = null;
    document.getElementById('t_task_date').value = new Date().toISOString().split('T')[0];
    const modal = document.getElementById('taskModal');
    modal.style.display = 'flex';
}

function editTask(task) {
    document.getElementById('taskForm').reset();
    document.getElementById('taskModalTitle').innerText = 'Edit Task';
    document.getElementById('saveTaskBtn').innerText = 'Save Changes';
    currentEditTaskId = task.id;
    document.getElementById('t_project_id').value = task.project_id;
    document.getElementById('t_task_date').value = task.task_date;
    document.getElementById('t_task_title').value = task.task_title;
    document.getElementById('t_hours').value = task.hours;
    document.getElementById('t_notes').value = task.notes || '';
    document.getElementById('taskModal').style.display = 'flex';
}

function hideTaskModal() { document.getElementById('taskModal').style.display = 'none'; }

async function saveTask() {
    const form = document.getElementById('taskForm');
    if (!form.reportValidity()) return;
    const payload = { project_id: document.getElementById('t_project_id').value, task_date: document.getElementById('t_task_date').value, task_title: document.getElementById('t_task_title').value, hours: document.getElementById('t_hours').value, notes: document.getElementById('t_notes').value };
    const btn = document.getElementById('saveTaskBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    let url = rdApi('api/tasks.php');
    let method = 'POST';
    if (currentEditTaskId) { url += `?id=${currentEditTaskId}`; method = 'PUT'; }
    try {
        await fetch(url, { method, headers:{'Content-Type':'application/json'}, credentials:'same-origin', body:JSON.stringify(payload) });
        hideTaskModal();
        loadTasks();
        Swal.fire({ title: currentEditTaskId ? 'Updated!' : 'Added!', text:`Task ${currentEditTaskId ? 'updated' : 'added'} successfully.`, icon:'success', timer:1500, showConfirmButton:false });
    } catch(e) { Swal.fire('Error','Failed to save task.','error'); }
    finally { btn.disabled = false; btn.textContent = currentEditTaskId ? 'Save Changes' : 'Add Task'; }
}

async function deleteTask(id) {
    const result = await Swal.fire({ title:'Delete this task?', text:'This action cannot be undone.', icon:'warning', showCancelButton:true, confirmButtonColor:'#df433f', cancelButtonColor:'#979b92', confirmButtonText:'Yes, delete it!' });
    if (result.isConfirmed) {
        await fetch(rdApi(`api/tasks.php?id=${id}`), { method:'DELETE', credentials:'same-origin' });
        Swal.fire({ title:'Deleted!', text:'Task removed.', icon:'success', timer:1500, showConfirmButton:false });
        loadTasks();
    }
}

document.getElementById('searchTasks').addEventListener('input', () => applyFiltersAndRender());
document.getElementById('filterProject').addEventListener('change', () => applyFiltersAndRender());
document.getElementById('filterDate').addEventListener('change', () => applyFiltersAndRender());

loadProjects().then(() => loadTasks());
</script>
</body>
</html>
