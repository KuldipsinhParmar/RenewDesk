<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Task Tracker - RenewDesk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    <!-- Tom Select (jQuery-free searchable selects) -->
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/datatables.net-dt@2/css/dataTables.dataTables.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/datatables.net@2/js/dataTables.min.js"></script>
    <script src="assets/js/sidebar.js"></script>
    <link rel="stylesheet" href="assets/css/v2.css">
    <style>
        /* ── Tom Select overrides to match v2.css ── */
        .ts-wrapper { flex:1; min-width:140px; }
        .ts-wrapper.single .ts-control { background:var(--surface-2); border:1px solid var(--border-2); border-radius:10px; padding:9px 14px; font-size:13.5px; font-family:inherit; color:var(--text); box-shadow:none; cursor:pointer; min-height:0; }
        .ts-wrapper.single.input-active .ts-control,
        .ts-wrapper.single .ts-control:focus-within { border-color:var(--accent); outline:none; box-shadow:0 0 0 3px rgba(15,157,118,.15); }
        .ts-dropdown { border:1px solid var(--border-2); border-radius:12px; box-shadow:0 8px 28px rgba(0,0,0,.12); background:var(--surface); font-family:inherit; font-size:13.5px; margin-top:4px; overflow:hidden; }
        .ts-dropdown .option { padding:10px 14px; color:var(--text); }
        .ts-dropdown .option:hover, .ts-dropdown .option.active { background:var(--accent-soft); color:var(--accent); }
        .ts-dropdown .option.selected { background:var(--accent-soft); color:var(--accent); font-weight:600; }
        .ts-dropdown-content { max-height:220px; }
        .ts-control input { color:var(--text) !important; }
        .ts-wrapper.single .ts-control .placeholder { color:var(--text-3); }
        /* In modal, full-width */
        .rd-modal-body .ts-wrapper { width:100%; }
        .rd-modal-body .ts-wrapper.single .ts-control { padding:10px 14px; }

        /* ── Table ── */
        .rd-th { padding:11px 16px; text-align:left; font-size:10.5px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--text-3); border-bottom:1px solid var(--border); white-space:nowrap; }
        .rd-th:first-child { padding-left:22px; }
        .rd-th:last-child { padding-right:22px; text-align:right; }
        .rd-td { padding:13px 16px; border-bottom:1px solid var(--border); vertical-align:middle; font-size:13.5px; }
        .rd-td:first-child { padding-left:22px; }
        .rd-td:last-child { padding-right:22px; }
        .task-tr { transition:background .1s; }
        .task-tr:hover { background:var(--surface-2); }
        .task-tr:hover .task-acts { opacity:1; }
        .task-tr:last-child .rd-td { border-bottom:none; }
        .task-acts { opacity:0; transition:opacity .15s; display:flex; gap:5px; justify-content:flex-end; }

        /* ── Stats ── */
        .stat-card { display:flex; align-items:center; gap:14px; padding:18px 20px; }
        .stat-icon { width:42px; height:42px; border-radius:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .stat-val { font-family:'IBM Plex Mono',monospace; font-size:24px; font-weight:700; line-height:1.1; }
        .stat-lbl { font-size:10.5px; text-transform:uppercase; letter-spacing:.07em; color:var(--text-3); font-weight:700; margin-top:3px; }
    </style>
</head>
<body class="rd-body">
<div class="rd-layout">

    <aside class="rd-sidebar" id="rd-sidebar"></aside>
    <script>rdSidebar.init('tasks');</script>

    <div class="rd-main">
        <div class="rd-page-header">
            <button class="rd-menu-btn" onclick="rdSidebar.open()" aria-label="Menu">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <div>
                <h1 class="rd-page-title">Task Tracker</h1>
                <p class="rd-page-subtitle" id="taskSubtitle">Work log across all projects</p>
            </div>
            <button onclick="showAddModal()" class="rd-btn rd-btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                Add Task
            </button>
        </div>

        <!-- Stats -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px">
            <div class="rd-card stat-card">
                <div class="stat-icon" style="background:var(--accent-soft)">
                    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M8.5 12.3l2.4 2.4 4.6-5"/></svg>
                </div>
                <div><div class="stat-val" id="stTasks">—</div><div class="stat-lbl">Tasks</div></div>
            </div>
            <div class="rd-card stat-card">
                <div class="stat-icon" style="background:rgba(91,105,230,.12)">
                    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="var(--c-blue)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
                </div>
                <div><div class="stat-val" id="stHours">—</div><div class="stat-lbl">Total Hours</div></div>
            </div>
            <div class="rd-card stat-card">
                <div class="stat-icon" style="background:var(--good-soft)">
                    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="var(--good)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                </div>
                <div><div class="stat-val" id="stToday">—</div><div class="stat-lbl">Today's Hours</div></div>
            </div>
            <div class="rd-card stat-card">
                <div class="stat-icon" style="background:rgba(224,144,42,.12)">
                    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="var(--c-amber)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                </div>
                <div><div class="stat-val" id="stProjects">—</div><div class="stat-lbl">Projects</div></div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="rd-toolbar" style="flex-wrap:wrap;gap:10px;margin-bottom:16px">
            <div class="rd-search-wrap" style="min-width:180px;flex:1">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
                <input id="searchTasks" class="rd-search-input" placeholder="Search tasks or projects…" type="text"/>
            </div>
            <!-- Tom Select filters rendered after JS loads -->
            <select id="filterProject"><option value="">All Projects</option></select>
            <select id="filterCountry"><option value="">All Countries</option></select>
            <input type="date" id="filterDate" class="rd-filter-select" title="Filter by date" style="cursor:pointer;min-width:140px">
            <button id="btnClear" onclick="clearFilters()" class="rd-btn" style="display:none">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
                Clear
            </button>
        </div>

        <!-- Table -->
        <div class="rd-card" style="overflow:hidden">
            <table id="tasksDataTable" style="width:100%;border-collapse:collapse">
                <thead>
                    <tr>
                        <th class="rd-th">Date</th>
                        <th class="rd-th">Project</th>
                        <th class="rd-th">Country</th>
                        <th class="rd-th">Task</th>
                        <th class="rd-th" style="text-align:center">Hours</th>
                        <th class="rd-th">Notes</th>
                        <th class="rd-th" style="text-align:right">Actions</th>
                    </tr>
                </thead>
                <tbody id="taskTableBody">
                    <tr><td colspan="7" class="rd-td" style="text-align:center;color:var(--text-3);padding:40px">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Task Modal -->
<div id="taskModal" class="rd-modal-overlay" style="display:none">
    <div class="rd-modal" style="width:100%;max-width:520px">
        <div class="rd-modal-header">
            <h3 class="rd-modal-title" id="modalTitle">Add New Task</h3>
            <button onclick="hideModal()" class="rd-icon-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
        </div>
        <div class="rd-modal-body">
            <form id="taskForm" autocomplete="off">
                <div class="rd-form-group">
                    <label class="rd-label">Project <span style="color:var(--bad)">*</span></label>
                    <select id="t_project_id" required><option value="">Select project…</option></select>
                </div>
                <div class="rd-grid-2" style="margin-top:14px">
                    <div class="rd-form-group">
                        <label class="rd-label">Date <span style="color:var(--bad)">*</span></label>
                        <input type="date" id="t_task_date" class="rd-input" required>
                    </div>
                    <div class="rd-form-group">
                        <label class="rd-label">Hours <span style="color:var(--bad)">*</span></label>
                        <input type="number" step="0.5" min="0" max="24" id="t_hours" class="rd-input" placeholder="e.g. 2.5" required>
                    </div>
                </div>
                <div class="rd-form-group" style="margin-top:14px">
                    <label class="rd-label">Task Title <span style="color:var(--bad)">*</span></label>
                    <input type="text" id="t_task_title" class="rd-input" placeholder="e.g. Homepage redesign, API integration…" required>
                </div>
                <div class="rd-form-group" style="margin-top:14px">
                    <label class="rd-label">Notes <span style="color:var(--text-3)">(optional)</span></label>
                    <textarea id="t_notes" rows="3" class="rd-input rd-textarea" placeholder="Any additional details…"></textarea>
                </div>
            </form>
        </div>
        <div class="rd-modal-footer">
            <button onclick="hideModal()" class="rd-btn">Cancel</button>
            <button onclick="saveTask()" id="saveBtn" class="rd-btn rd-btn-primary">Add Task</button>
        </div>
    </div>
</div>

<script src="assets/js/rd-api.js"></script>
<script>
let allTasks    = [];
let allProjects = [];
let editId      = null;
let tsProject   = null; // Tom Select instances (toolbar)
let tsCountry   = null;
let tsModalProj = null;

const TODAY = new Date().toISOString().split('T')[0];

// ── Init Tom Select ──────────────────────────────────────────
function initTomSelects() {
    const base = { placeholder: '—', allowEmptyOption: true, onChange: applyFilters };
    tsProject = new TomSelect('#filterProject', { ...base });
    tsCountry = new TomSelect('#filterCountry', { ...base });
    tsModalProj = new TomSelect('#t_project_id', {
        placeholder: 'Select project…',
        allowEmptyOption: true,
        maxOptions: 300,
        onChange: () => {}
    });
}

// ── Data loaders ─────────────────────────────────────────────
async function loadProjects() {
    const res  = await fetch(rdApi('api/projects.php'), { credentials: 'same-origin' });
    if (res.status === 401) { window.location.href = 'login.html'; return; }
    const data = await res.json();
    allProjects = data.data || [];

    allProjects.forEach(p => {
        tsProject.addOption({ value: p.id, text: p.name });
        tsModalProj.addOption({ value: p.id, text: p.name });
    });

    // Unique countries from projects
    const seen = new Set();
    allProjects.forEach(p => {
        if (p.country_name && !seen.has(p.country_code)) {
            seen.add(p.country_code);
            const flag = countryFlag(p.country_code);
            tsCountry.addOption({ value: p.country_code, text: flag + ' ' + p.country_name });
        }
    });
    tsProject.refreshOptions(false);
    tsCountry.refreshOptions(false);
    tsModalProj.refreshOptions(false);
}

async function loadTasks() {
    const res  = await fetch(rdApi('api/tasks.php'), { credentials: 'same-origin' });
    if (res.status === 401) { window.location.href = 'login.html'; return; }
    const data = await res.json();
    allTasks = data.data || [];
    applyFilters();
}

// ── Filters + render ─────────────────────────────────────────
function applyFilters() {
    const search  = document.getElementById('searchTasks').value.toLowerCase();
    const projId  = tsProject  ? tsProject.getValue()  : '';
    const country = tsCountry  ? tsCountry.getValue()  : '';
    const date    = document.getElementById('filterDate').value;

    let rows = allTasks.filter(t => {
        if (search  && !t.task_title.toLowerCase().includes(search) && !(t.project_name||'').toLowerCase().includes(search) && !(t.notes||'').toLowerCase().includes(search)) return false;
        if (projId  && String(t.project_id) !== String(projId)) return false;
        if (country && t.country_code !== country) return false;
        if (date    && t.task_date !== date) return false;
        return true;
    });

    const hasFilter = search || projId || country || date;
    document.getElementById('btnClear').style.display = hasFilter ? '' : 'none';

    updateStats(rows);
    renderTable(rows);
}

function clearFilters() {
    document.getElementById('searchTasks').value = '';
    document.getElementById('filterDate').value  = '';
    if (tsProject)  tsProject.setValue('');
    if (tsCountry)  tsCountry.setValue('');
    applyFilters();
}

function updateStats(rows) {
    const totalH  = rows.reduce((s, t) => s + parseFloat(t.hours || 0), 0);
    const todayH  = rows.filter(t => t.task_date === TODAY).reduce((s, t) => s + parseFloat(t.hours || 0), 0);
    document.getElementById('stTasks').textContent    = rows.length;
    document.getElementById('stHours').textContent    = totalH.toFixed(1);
    document.getElementById('stToday').textContent    = todayH.toFixed(1);
    document.getElementById('stProjects').textContent = new Set(rows.map(t => t.project_id)).size;
    document.getElementById('taskSubtitle').textContent = rows.length + ' task' + (rows.length !== 1 ? 's' : '') + ' · ' + totalH.toFixed(1) + ' hours';
}

function fmtDate(d) {
    const dt = new Date(d + 'T00:00:00');
    const m  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dt.getMonth()];
    return `${dt.getDate()} ${m} ${dt.getFullYear()}`;
}

function countryFlag(code) {
    if (!code) return '';
    return code.toUpperCase().replace(/./g, c => String.fromCodePoint(127397 + c.charCodeAt(0)));
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

let tasksTable = null;

function renderTable(rows) {
    const tbody = document.getElementById('taskTableBody');
    if (tasksTable) { tasksTable.destroy(); tasksTable = null; }
    if (!rows.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="rd-td" style="text-align:center;padding:52px;color:var(--text-3)">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 12px;display:block;opacity:.3"><circle cx="12" cy="12" r="9"/><path d="M8.5 12.3l2.4 2.4 4.6-5"/></svg>
            No tasks found. Click <strong>Add Task</strong> to log your first entry.
        </td></tr>`;
        return;
    }

    tbody.innerHTML = rows.map(t => {
        const isToday   = t.task_date === TODAY;
        const dateCell  = isToday
            ? `<span class="mono" style="font-size:13px;color:var(--text)">${fmtDate(t.task_date)}</span> <span style="font-size:10px;font-weight:700;color:var(--good);background:var(--good-soft);padding:2px 7px;border-radius:99px;margin-left:4px">TODAY</span>`
            : `<span class="mono" style="font-size:13px;color:var(--text)">${fmtDate(t.task_date)}</span>`;

        const flag    = countryFlag(t.country_code);
        const country = t.country_name
            ? `<span title="${esc(t.country_name)}" style="font-size:13px">${flag} <span style="color:var(--text-2)">${esc(t.country_name)}</span></span>`
            : `<span style="color:var(--text-3)">—</span>`;

        const hoursColor = parseFloat(t.hours) >= 6 ? 'var(--good)' : parseFloat(t.hours) >= 3 ? 'var(--c-amber)' : 'var(--text)';

        return `<tr class="task-tr">
            <td class="rd-td" style="white-space:nowrap">${dateCell}</td>
            <td class="rd-td">
                <div style="font-weight:600;font-size:13.5px;color:var(--accent)">${esc(t.project_name)}</div>
            </td>
            <td class="rd-td">${country}</td>
            <td class="rd-td">
                <div style="font-weight:600;font-size:13.5px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(t.task_title)}">${esc(t.task_title)}</div>
            </td>
            <td class="rd-td" style="text-align:center">
                <span class="mono" style="font-size:17px;font-weight:700;color:${hoursColor}">${parseFloat(t.hours).toFixed(1)}</span>
                <div style="font-size:10px;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.05em">hrs</div>
            </td>
            <td class="rd-td" style="max-width:200px">
                <span style="color:var(--text-3);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block" title="${esc(t.notes)}">${t.notes ? esc(t.notes) : '—'}</span>
            </td>
            <td class="rd-td">
                <div class="task-acts">
                    <button onclick='editTask(${JSON.stringify(t).replace(/'/g,"&#39;")})' class="rd-icon-btn" title="Edit">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
                    </button>
                    <button onclick="deleteTask(${t.id})" class="rd-icon-btn danger" title="Delete">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
                    </button>
                </div>
            </td>
        </tr>`;
    }).join('');

    tasksTable = new DataTable('#tasksDataTable', {
        dom: 'tip',
        pageLength: 10,
        order: [],
        pagingType: 'simple_numbers',
        columnDefs: [{ orderable: false, targets: [5, 6] }],
        infoCallback: rdDtInfo('tasks'),
        language: { paginate: { previous: '‹', next: '›' } },
        drawCallback: rdPaintDtPaging
    });
}

// ── Modal ────────────────────────────────────────────────────
function showAddModal() {
    editId = null;
    document.getElementById('taskForm').reset();
    if (tsModalProj) tsModalProj.setValue('');
    document.getElementById('t_task_date').value = TODAY;
    document.getElementById('modalTitle').textContent  = 'Add New Task';
    document.getElementById('saveBtn').textContent = 'Add Task';
    document.getElementById('taskModal').style.display = 'flex';
}

function editTask(t) {
    editId = t.id;
    document.getElementById('taskForm').reset();
    if (tsModalProj) { tsModalProj.setValue(String(t.project_id)); }
    document.getElementById('t_task_date').value  = t.task_date;
    document.getElementById('t_hours').value      = t.hours;
    document.getElementById('t_task_title').value = t.task_title;
    document.getElementById('t_notes').value      = t.notes || '';
    document.getElementById('modalTitle').textContent  = 'Edit Task';
    document.getElementById('saveBtn').textContent = 'Save Changes';
    document.getElementById('taskModal').style.display = 'flex';
}

function hideModal() { document.getElementById('taskModal').style.display = 'none'; }

async function saveTask() {
    const form = document.getElementById('taskForm');
    const projId = tsModalProj ? tsModalProj.getValue() : document.getElementById('t_project_id').value;
    if (!projId) { Swal.fire({ icon:'warning', title:'Project required', text:'Please select a project.', confirmButtonColor:'var(--accent)' }); return; }
    if (!form.reportValidity()) return;

    const payload = {
        project_id: projId,
        task_date:  document.getElementById('t_task_date').value,
        task_title: document.getElementById('t_task_title').value,
        hours:      document.getElementById('t_hours').value,
        notes:      document.getElementById('t_notes').value
    };

    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Saving…';
    let url = rdApi('api/tasks.php'), method = 'POST';
    if (editId) { url += '?id=' + editId; method = 'PUT'; }

    try {
        await fetch(url, { method, headers: {'Content-Type':'application/json'}, credentials: 'same-origin', body: JSON.stringify(payload) });
        hideModal();
        await loadTasks();
        Swal.fire({ title: editId ? 'Updated!' : 'Added!', icon: 'success', timer: 1400, showConfirmButton: false });
    } catch(e) { Swal.fire('Error', 'Failed to save task.', 'error'); }
    finally { btn.disabled = false; btn.textContent = editId ? 'Save Changes' : 'Add Task'; }
}

async function deleteTask(id) {
    const result = await Swal.fire({ title: 'Delete this task?', text: 'This cannot be undone.', icon: 'warning', showCancelButton: true, confirmButtonColor: '#df433f', cancelButtonColor: '#979b92', confirmButtonText: 'Delete' });
    if (!result.isConfirmed) return;
    await fetch(rdApi('api/tasks.php?id=' + id), { method: 'DELETE', credentials: 'same-origin' });
    Swal.fire({ title: 'Deleted!', icon: 'success', timer: 1200, showConfirmButton: false });
    loadTasks();
}

// ── Events ───────────────────────────────────────────────────
document.getElementById('searchTasks').addEventListener('input', applyFilters);
document.getElementById('filterDate').addEventListener('change', applyFilters);
document.getElementById('taskModal').addEventListener('click', e => { if (e.target === document.getElementById('taskModal')) hideModal(); });

// ── Boot ─────────────────────────────────────────────────────
initTomSelects();
loadProjects().then(() => loadTasks());
